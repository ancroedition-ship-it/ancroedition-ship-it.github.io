<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Universal Master Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 60px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
            touch-action: none; /* Prevents mobile 'bounce' and pull-to-refresh */
        }

        /* Responsive Container */
        .studio-container {
            width: 1366px; height: 657px;
            max-width: 100%; max-height: 100%;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 20px; border: 1px solid var(--border);
            position: relative;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); letter-spacing: 2px; font-size: 14px; text-shadow: 0 0 10px var(--amber-glow); }

        .studio-viewport {
            display: flex; flex: 1; 
            padding: 15px 0; overflow: hidden; position: relative;
        }

        /* --- MODE 1: LANDSCAPE (Desktop/Tablet) --- */
        @media (orientation: landscape) {
            .studio-viewport { flex-direction: row; }
            .middle-stack { flex: 0 0 600px; width: 600px; height: 100%; }
            .drag-bar { width: 60px; margin: 0 -30px; cursor: col-resize; height: 100%; }
            .drag-bar::after { width: 2px; height: 60px; }
        }

        /* --- MODE 2: PORTRAIT (Mobile) --- */
        @media (orientation: portrait) {
            .studio-viewport { flex-direction: column; }
            .middle-stack { flex: 0 0 45%; width: 100%; }
            .drag-bar { height: 60px; margin: -30px 0; cursor: row-resize; width: 100%; }
            .drag-bar::after { width: 60px; height: 2px; }
        }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; 
            overflow: hidden; height: 100%; width: 100%;
        }

        .visual-pane { 
            flex: 1 1 0; 
            background: #ffffff; 
            min-width: 100px; 
            min-height: 100px; 
            z-index: 1;
        }

        .pane-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 12px; background: rgba(255, 255, 255, 0.03);
            color: var(--amber); border-bottom: 1px solid var(--border); font-weight: bold;
        }

        /* 60px UNIVERSAL DRAGBAR */
        .drag-bar {
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; z-index: 100; touch-action: none;
        }

        .drag-bar::after {
            content: ''; background: var(--amber); 
            box-shadow: 0 0 8px var(--amber-glow);
            transition: transform 0.1s, background 0.1s;
        }

        .drag-bar:active::after { background: #fff; transform: scale(1.5); }

        /* THE SHIELD: Prevents iframe focus theft */
        #drag-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; display: none;
        }

        .code-area {
            flex: 1; padding: 15px; font-family: 'Courier New', monospace;
            font-size: 13px; color: #cbd5e1; overflow-y: auto;
            outline: none; line-height: 1.5; caret-color: var(--amber);
            white-space: pre-wrap; word-break: break-all;
        }

        /* CUSTOM SCROLLBAR (Discreet) */
        .code-area::-webkit-scrollbar { width: 6px; }
        .code-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="drag-shield"></div>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="color: #888; background: #f9f9f9;">Visual Output</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const shield = document.getElementById('drag-shield');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        
        let isDragging = false;
        let debounceTimer;

        // --- THE ENGINE ---
        function onMove(e) {
            if (!isDragging) return;
            
            // Check orientation
            const isPortrait = window.innerHeight > window.innerWidth;
            const viewport = document.querySelector('.studio-viewport').getBoundingClientRect();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            if (isPortrait) {
                // Vertical Drag Logic (Top/Bottom)
                let newH = clientY - viewport.top;
                const minH = 100;
                const maxH = viewport.height - 100;

                if (newH < minH) newH = minH;
                if (newH > maxH) newH = maxH;

                middleStack.style.flex = `0 0 ${newH}px`;
                middleStack.style.height = `${newH}px`;
                middleStack.style.width = `100%`;
            } else {
                // Horizontal Drag Logic (Left/Right)
                let newW = clientX - viewport.left;
                const minW = 200;
                const maxW = viewport.width - 250;

                if (newW < minW) newW = minW;
                if (newW > maxW) newW = maxW;

                middleStack.style.flex = `0 0 ${newW}px`;
                middleStack.style.width = `${newW}px`;
                middleStack.style.height = `100%`;
            }
        }

        // --- LISTENERS ---
        const startDrag = (e) => {
            isDragging = true;
            shield.style.display = 'block';
            document.body.style.userSelect = 'none';
            if(e.cancelable) e.preventDefault();
        };

        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag, {passive: false});

        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        
        const stopDrag = () => {
            isDragging = false;
            shield.style.display = 'none';
            document.body.style.userSelect = 'auto';
        };

        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        // --- PREVIEW LOGIC ---
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const doc = preview.contentDocument || preview.contentWindow.document;
                const content = codeInput.innerText;
                // Standardizing the base look for all brands
                const head = `<style>body{font-family:sans-serif;padding:15px;margin:0;word-wrap:break-word;background:#fff;}</style>`;
                doc.open();
                doc.write(head + content);
                doc.close();
            }, 300);
        }

        // Clean Paste
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        codeInput.addEventListener('input', updatePreview);
        window.onload = () => { updatePreview(); codeInput.focus(); };
    </script>
</body>
</html>
