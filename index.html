<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSENTIX | FINAL MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #0a0a0a;
            --bg-pane: #161618; 
            --accent: #f59e0b; 
            --edge-color: #27272a; 
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg-main); color: #e4e4e7;
            font-family: 'Inter', sans-serif; width: 1366px; height: 650px;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER & MULTI-SCROLL DOCK --- */
        .ui-header { 
            height: 75px; display: flex; align-items: center; 
            padding: 0 30px; border-bottom: 1px solid var(--edge-color); background: #09090b;
            z-index: 100; gap: 20px; flex-shrink: 0;
        }

        .dock-wrapper {
            flex: 1; height: 100%; position: relative;
            display: flex; align-items: center; overflow: hidden;
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }

        #header-dock-track {
            display: flex; align-items: center; gap: 10px;
            overflow-x: scroll; height: 55px; padding: 0 15px;
            scroll-behavior: smooth;
        }

        /* SCROLLBAR FIX */
        #header-dock-track::-webkit-scrollbar { height: 4px; }
        #header-dock-track::-webkit-scrollbar-track { background: transparent; }
        #header-dock-track::-webkit-scrollbar-thumb { 
            background: #1c1c1e; border-radius: 10px; 
        }
        #header-dock-track:hover::-webkit-scrollbar-thumb { background: #3f3f46; }

        .header-slot {
            min-width: 110px; height: 38px; border: 1px dashed #27272a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #3f3f46; font-weight: 900; letter-spacing: 0.1em;
            transition: 0.2s; flex-shrink: 0; background: rgba(255,255,255,0.01);
            position: relative;
        }
        .header-slot.drag-over { border-color: var(--accent); background: rgba(245, 158, 11, 0.05); }

        /* --- WORKSPACE --- */
        .split-container { display: flex; flex: 1; padding: 10px; position: relative; background: var(--bg-main); }
        .pane { display: flex; flex-direction: column; background: var(--bg-pane); border: 1px solid var(--edge-color); border-radius: 12px; overflow: hidden; }
        #leftPane { width: 668px; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
        #rightPane { flex: 1; border-left: none; }

        .label-bar { height: 48px; background: #0d0d0f; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--edge-color); cursor: grab; }
        .label-text { font-size: 10px; font-weight: 800; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; pointer-events: none; }

        #editor-scroll { flex: 1; padding: 20px; display: flex; overflow: hidden; }
        #editor { flex: 1; background: transparent; border: none; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #facc15; white-space: pre-wrap; overflow-y: auto; }
        #live-preview { flex: 1; width: 100%; border: none; background: transparent; }
        
        /* CLICK-SNAP DIVIDER (DRAG DISABLED) */
        .snap-divider { width: 16px; cursor: pointer; display: flex; justify-content: center; z-index: 50; margin: 0 -8px; }
        .divider-line { width: 2px; background: #1a1a1c; transition: 0.2s; }
        .snap-divider:hover .divider-line { background: var(--accent); box-shadow: 0 0 12px var(--accent); }

        /* DOCKING STATE STYLES */
        .header-slot .pane { position: absolute; inset: 0; width: 100% !important; height: 100% !important; border: none; }
        .header-slot .label-bar { height: 100%; border: none; background: transparent; justify-content: center; }
        .header-slot .label-text { color: var(--accent); font-size: 8px; letter-spacing: 0.05em; }
        .header-slot #editor-scroll, .header-slot iframe, .header-slot .controls-wrap { display: none; }

        .btn-action { background: #1c1c1e; color: var(--accent); font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 4px; border: 1px solid #2d2d30; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { border-color: var(--accent); }
        
        .ns-path { stroke: var(--accent); stroke-width: 2; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 3s infinite alternate; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <header class="ui-header">
        <div class="flex items-center flex-shrink-0">
            <svg style="height:26px" viewBox="0 0 100 40"><path class="ns-path" d="M10,20 Q30,5 50,20 T90,20" /></svg>
            <h1 style="font-size: 12px; font-weight: 900; letter-spacing: 0.2em; color: #52525b; margin-left: 10px;">NEUROSENTIX</h1>
        </div>

        <div class="dock-wrapper">
            <div id="header-dock-track">
                <div class="header-slot">SLOT_01</div><div class="header-slot">SLOT_02</div>
                <div class="header-slot">SLOT_03</div><div class="header-slot">SLOT_04</div>
                <div class="header-slot">SLOT_05</div><div class="header-slot">SLOT_06</div>
                <div class="header-slot">SLOT_07</div><div class="header-slot">SLOT_08</div>
                <div class="header-slot">SLOT_09</div><div class="header-slot">SLOT_10</div>
            </div>
        </div>

        <div id="status" class="flex-shrink-0" style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%;"></div>
    </header>

    <div class="split-container" id="workspace">
        <div class="pane" id="leftPane">
            <div class="label-bar" id="handle-l">
                <span class="label-text">Source</span>
                <div class="controls-wrap flex gap-2">
                    <button id="clearBtn" class="btn-action" style="color:#ef4444">CLEAR</button>
                    <button id="copyBtn" class="btn-action">COPY</button>
                </div>
            </div>
            <div id="editor-scroll"><div id="editor" contenteditable="true" spellcheck="false"></div></div>
        </div>

        <div class="snap-divider" id="snap-bar"><div class="divider-line"></div></div>

        <div class="pane" id="rightPane">
            <div class="label-bar" id="handle-r"><span class="label-text">Preview</span></div>
            <iframe id="live-preview"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('live-preview');
        const leftPane = document.getElementById('leftPane');
        const rightPane = document.getElementById('rightPane');
        const workspace = document.getElementById('workspace');
        const snapBar = document.getElementById('snap-bar');
        const dockTrack = document.getElementById('header-dock-track');

        const update = () => {
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(`<style>body{background:#161618;color:#f59e0b;font-family:monospace;padding:20px;line-height:1.6;}</style>${editor.innerText || ""}`);
            doc.close();
        };
        editor.addEventListener('input', update);

        // --- HORIZONTAL WHEEL SCROLL ---
        dockTrack.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); dockTrack.scrollLeft += e.deltaY; }
        });

        // --- CLICK TO SNAP (MIDDLE) ---
        workspace.onmousedown = (e) => {
            if (e.target === workspace || e.target === snapBar || e.target.classList.contains('divider-line')) {
                let rect = workspace.getBoundingClientRect();
                let x = e.clientX - rect.left;
                if (x > 180 && x < rect.width - 180) leftPane.style.width = x + 'px';
            }
        };

        // --- DRAG MECHANICS ---
        const setupDrag = (pane, handle) => {
            handle.onmousedown = () => pane.setAttribute('draggable', 'true');
            handle.onmouseup = () => pane.setAttribute('draggable', 'false');
            pane.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', pane.id);
                setTimeout(() => pane.style.opacity = "0.2", 0);
            };
            pane.ondragend = () => {
                pane.style.opacity = "1";
                pane.setAttribute('draggable', 'false');
            };
        };
        setupDrag(leftPane, document.getElementById('handle-l'));
        setupDrag(rightPane, document.getElementById('handle-r'));

        // --- DROP INTO SLOTS ---
        document.querySelectorAll('.header-slot').forEach(slot => {
            slot.ondragover = (e) => { e.preventDefault(); slot.classList.add('drag-over'); };
            slot.ondragleave = () => slot.classList.remove('drag-over');
            slot.ondrop = (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                const id = e.dataTransfer.getData('text/plain');
                const el = document.getElementById(id);
                if (el) { slot.innerHTML = ""; slot.appendChild(el); checkMiddle(); }
            };
        });

        // --- DROP INTO WORKSPACE ---
        workspace.ondragover = (e) => e.preventDefault();
        workspace.ondrop = (e) => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const el = document.getElementById(id);
            if (el) {
                if (id === 'leftPane') workspace.insertBefore(el, snapBar);
                else workspace.appendChild(el);
                checkMiddle();
            }
        };

        function checkMiddle() {
            snapBar.style.display = (workspace.querySelectorAll('.pane').length === 2) ? 'flex' : 'none';
        }

        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(editor.innerText);
            document.getElementById('copyBtn').innerText = "COPIED";
            setTimeout(() => document.getElementById('copyBtn').innerText = "COPY", 1000);
        };
        document.getElementById('clearBtn').onclick = () => { editor.innerText = ""; update(); };
        
        update();
    </script>
</body>
</html>
