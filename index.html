<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix Core Studio | Unified Middle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-bg: #141416;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #64748b;
            --spacing-side: 32px;
            --header-h: 60px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 1366px; height: 657px;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        .studio-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0 var(--spacing-side);
        }

        .studio-header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); }

        .studio-viewport {
            display: flex;
            flex: 1;
            padding: 16px 0;
            height: calc(657px - var(--header-h)); 
            overflow: hidden;
        }

        /* --- THE UNIFIED MIDDLE COLUMN --- */
        .middle-stack {
            display: flex;
            flex-direction: column;
            flex: 0 0 500px; /* Initial width of the combined center */
            gap: 12px;
            height: 100%;
        }

        .pane {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Editor gets more space in the stack */
        .editor-pane { flex: 3; }
        /* Structure pane sits below it */
        .structure-pane { flex: 1; }

        .visual-pane { flex: 1; background: #ffffff; margin-left: 0; }

        .pane-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--amber);
            border-bottom: 1px solid var(--border);
        }

        /* --- DRAGBAR --- */
        .drag-bar {
            width: 16px;
            cursor: col-resize;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drag-bar::after {
            content: '';
            width: 2px; height: 40px;
            background: var(--border);
            transition: 0.3s;
        }

        .drag-bar:hover::after { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

        .code-area {
            flex: 1; padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px; color: #d1d5db;
            overflow-y: auto; white-space: pre; outline: none;
        }

        .output-frame { width: 100%; height: 100%; border: none; }

        .view-toggle {
            background: rgba(255, 255, 255, 0.03);
            padding: 3px; border-radius: 8px; display: flex; border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-dim);
            padding: 5px 15px; border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        .toggle-btn.active { background: var(--amber); color: #000; font-weight: 600; }
    </style>
</head>
<body>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
            <nav class="view-toggle">
                <button class="toggle-btn active">Source</button>
                <button class="toggle-btn">Visual</button>
            </nav>
            <div style="font-size: 10px; color: var(--text-dim);">CORE STUDIO V1.2</div>
        </header>

        <main class="studio-viewport">
            
            <div class="middle-stack" id="middleStack">
                
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input">
<div class="card">
  <h1>Neurosentix</h1>
  <p>Unified Middle Layout</p>
</div>

<style>
  .card { padding: 20px; border: 2px solid #ffbf00; border-radius: 10px; }
  h1 { color: #ffbf00; margin: 0; }
</style>
                    </div>
                </section>

                <aside class="pane structure-pane">
                    <div class="pane-label">Structure / Explorer</div>
                    <div style="padding: 15px; font-size: 12px; color: var(--text-dim);">
                        <span style="color: var(--amber)">▸ Project</span><br>
                        &nbsp;&nbsp;└─ index.html<br>
                        &nbsp;&nbsp;└─ core.css
                    </div>
                </aside>

            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f1f1f1; color: #777;">Live Preview</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>

        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');

        let isResizing = false;

        handle.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            preview.style.pointerEvents = 'none'; // Prevent iframe from eating mouse events
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            preview.style.pointerEvents = 'all';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerLeft = document.querySelector('.studio-viewport').getBoundingClientRect().left;
            let newWidth = e.clientX - containerLeft;
            
            // Bounds for the unified middle column
            if (newWidth > 300 && newWidth < 1000) {
                middleStack.style.flex = `0 0 ${newWidth}px`;
            }
        });

        function updatePreview() {
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(codeInput.innerText);
            doc.close();
        }

        codeInput.addEventListener('input', updatePreview);
        window.onload = updatePreview;
    </script>
</body>
</html>
