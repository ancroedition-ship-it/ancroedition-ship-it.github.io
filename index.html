<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix Core Studio | 1366x657 Optimized</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --panel-bg: #141416;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.2);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #64748b;
            --spacing-side: 32px;
            --header-h: 60px; /* Slimmer header for 657px height */
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 1366px;   /* Forced Browser Width */
            height: 657px;  /* Forced Browser Height */
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        .studio-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 0 var(--spacing-side);
        }

        .studio-header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; letter-spacing: 1.5px; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); }

        /* Viewport calculation adjusted for 657px total height */
        .studio-viewport {
            display: flex;
            flex: 1;
            padding: 16px 0; /* Reduced vertical padding */
            gap: 0;
            height: calc(657px - var(--header-h)); 
            overflow: hidden;
        }

        .pane {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .pane-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--amber);
            border-bottom: 1px solid var(--border);
        }

        .editor-pane { flex: 0 0 500px; } /* Initial static width for source */
        .visual-pane { flex: 1; background: #ffffff; }
        .structure-pane { flex: 0 0 200px; margin-left: 12px; }

        .drag-bar {
            width: 14px;
            cursor: col-resize;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drag-bar::after {
            content: '';
            width: 2px;
            height: 30px;
            background: var(--border);
            transition: 0.3s;
        }

        .drag-bar:hover::after { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

        .code-area {
            flex: 1;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #d1d5db;
            overflow-y: auto;
            white-space: pre;
            outline: none;
            line-height: 1.5;
        }

        .output-frame { width: 100%; height: 100%; border: none; }

        /* View Toggle */
        .view-toggle {
            background: rgba(255, 255, 255, 0.03);
            padding: 3px;
            border-radius: 8px;
            display: flex;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-dim);
            padding: 5px 15px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }

        .toggle-btn.active { background: var(--amber); color: #000; font-weight: 600; }
    </style>
</head>
<body>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
            <nav class="view-toggle">
                <button class="toggle-btn active">Source</button>
                <button class="toggle-btn">Visual</button>
            </nav>
            <div style="font-size: 10px; color: var(--text-dim);">1366x657 OPTIMIZED</div>
        </header>

        <main class="studio-viewport">
            <section class="pane editor-pane" id="editorSection">
                <div class="pane-label">Source</div>
                <div class="code-area" contenteditable="true" spellcheck="false" id="code-input">
<h1 style="color: #ffbf00; font-family: sans-serif;">Core Studio</h1>
                </div>
            </section>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane" id="visualSection">
                <div class="pane-label" style="background: #eee; color: #777;">Preview</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>

            <aside class="pane structure-pane">
                <div class="pane-label">Structure</div>
                <div style="padding: 15px; font-size: 12px; color: var(--text-dim);">
                    Project Root<br>
                    └─ index.html
                </div>
            </aside>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const editor = document.getElementById('editorSection');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');

        let isResizing = false;

        handle.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mouseup', () => isResizing = false);

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerLeft = document.querySelector('.studio-viewport').getBoundingClientRect().left;
            let newWidth = e.clientX - containerLeft;
            if (newWidth > 200 && newWidth < 900) {
                editor.style.flex = `0 0 ${newWidth}px`;
            }
        });

        function updatePreview() {
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(codeInput.innerText);
            doc.close();
        }

        codeInput.addEventListener('input', updatePreview);
        window.onload = updatePreview;
    </script>
</body>
</html>
