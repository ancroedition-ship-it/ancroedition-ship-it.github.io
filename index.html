<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --hud-green: #00ff88;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
            --boundary-color: rgba(0, 102, 255, 0.2);
            --font-main: 'SF Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: var(--font-main);
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { 
            background: var(--hud-blue); 
            border-radius: 10px; 
            box-shadow: 0 0 8px var(--hud-blue); 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--hud-red); 
            box-shadow: 0 0 12px var(--hud-red); 
        }

        #boot-loader {
            position: absolute; inset: 0;
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: var(--hud-blue);
            font-size: 10px; letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }

        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper {
             width: 100vw; height: 100vh;
            max-width: 100vw; max-height: 100vh;
            position: relative;
            background-color: var(--bg-dark);
        }

        .studio-container {
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .nav-tools { display: flex; align-items: center; gap: 10px; }
        
        #forensic-btn {
            background: transparent;
            border: 1px solid var(--hud-red);
            color: var(--hud-red);
            font-size: 8px;
            cursor: pointer;
            height: 16px;
            padding: 0px 6px;
            font-family: inherit;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 2px;
        }
        #forensic-btn:hover {
            background: rgba(255, 23, 68, 0.1);
            box-shadow: 0 0 8px var(--hud-red);
        }

        .hud-input-small { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--hud-blue); 
            font-size: 9px; padding: 2px 5px; width: 45px; outline: none; transition: border 0.2s;
        }

        #goto-btn {
            background: var(--hud-blue); border: none; color: white; 
            font-size: 9px; cursor: pointer; height: 16px; padding: 0px 8px; 
            font-family: inherit; transition: background 0.2s;
        }
        #goto-btn:hover { background: var(--hud-red); }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.8); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; min-height: 50px; min-width: 50px; }
        .preview-pane { flex: 1; background: #fff; border: 2px solid #ccc; }

        .editor-pane .pane-label { 
            font-size: 9px; padding: 10px;
            background: rgba(0, 102, 255, 0.15); color: var(--hud-blue); 
            border-bottom: 1px solid var(--boundary-color);
            font-weight: bold; letter-spacing: 1px;
            text-shadow: 0 0 5px var(--hud-blue);
        }

        .search-container { padding: 5px 10px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--boundary-color); margin: 5px; display: flex; align-items: center; }
        #search-input { background: transparent; border: none; color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px 8px; outline: none; width: 100%; }
        #match-count { color: var(--hud-blue); font-size: 9px; margin-left: 10px; white-space: nowrap; opacity: 0.6; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; position: relative; border: 2px solid var(--boundary-color); margin: 5px; }
        
        #line-numbers {
            width: 40px; padding: 20px 0; background: rgba(0,0,0,0.4);
            color: rgba(255,255,255,0.2); font-size: 13px; text-align: center; 
            border-right: 2px solid var(--boundary-color); overflow: hidden; 
            line-height: 1.5; pointer-events: none; font-family: var(--font-main);
        }

        .ln-mark { color: var(--hud-red) !important; text-shadow: 0 0 8px var(--hud-red); font-weight: bold; background: rgba(255, 23, 68, 0.2); }

        .code-area { 
            flex: 1; padding: 20px; color: #a1a1aa; outline: none; font-size: 13px; white-space: pre; 
            overflow: auto; user-select: text; line-height: 1.5; position: relative;
            font-family: var(--font-main); border-left: 1px solid var(--border); background-color: #1f2933;
            -webkit-user-modify: read-write-plaintext-only; tab-size: 4;
        }
        
        mark { background: rgba(255, 23, 68, 0.3); color: #fff; border-radius: 1px; }
        mark.current-match { background: rgba(255, 23, 68, 0.8); box-shadow: 0 0 12px var(--hud-red); }

        .drag-bar { background: rgba(0, 102, 255, 0.1); z-index: 100; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        .drag-bar::before { content: ""; width: 2px; height: 30%; background: var(--hud-blue); border-radius: 2px; box-shadow: 0 0 8px var(--hud-blue); }
        
        iframe { width: 100%; height: 100%; border: none; }
        .shield { pointer-events: none !important; }

        #chat-trigger { 
            position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; 
            background: var(--bg-dark); border: 2px solid var(--hud-blue); border-radius: 50%; 
            color: var(--hud-blue); display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 600; font-size: 20px; box-shadow: 0 0 10px var(--hud-blue);
        }
        #chat-dialog { position: fixed; inset: 0; background: rgba(10, 10, 15, 0.98); z-index: 900; display: none; flex-direction: column; padding: 30px; }
        #chat-body { flex: 1; margin-top: 20px; border: 1px solid var(--boundary-color); padding: 20px; color: #ccc; font-size: 13px; overflow-y: auto; background: #1f2933; }
        
        .chat-input-wrapper { margin-top: 15px; display: flex; gap: 10px; border: 1px solid var(--boundary-color); padding: 10px; align-items: flex-end; }
        #terminal-input { flex: 1; background: transparent; border: none; outline: none; color: var(--hud-red); font-family: inherit; resize: none; max-height: 150px; overflow-y: auto; line-height: 1.4; }

        #send-btn {
            background: transparent; border: 1px solid var(--hud-red); color: var(--hud-red);
            font-family: var(--font-main); font-size: 10px; cursor: pointer; padding: 4px 12px;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }
        #send-btn:hover { background: rgba(255, 23, 68, 0.1); box-shadow: 0 0 8px var(--hud-red); }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper" id="main-frame">
        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX STUDIO</span>
                <div class="nav-tools">
                    <button id="forensic-btn">FORENSIC_SCAN</button> 
                    <input type="number" id="goto-input" class="hud-input-small" placeholder="L#">
                    <button id="goto-btn">GO</button>
                    <span id="status-indicator">● OFFLINE</span>
                </div>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="search" spellcheck="false" autocomplete="off">
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000; padding:10px; font-size:9px;">RUNTIME</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <div id="chat-trigger">◈</div>
    <div id="chat-dialog">
        <div style="display:flex; justify-content:space-between; color:var(--hud-red); font-size:11px; letter-spacing:3px; border-bottom:1px solid var(--boundary-color); padding-bottom:10px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <span>TERMINAL_LINK</span>
                <span id="api-latency" style="color:var(--hud-blue); font-size:9px; opacity:0.6;"></span>
            </div>
            <span id="close-dialog" style="cursor:pointer;">[ ESC_X ]</span>
        </div>
        <div id="chat-body">> [SYSTEM]: Live Context Ready.</div>
        <div class="chat-input-wrapper">
            <span style="color:var(--hud-red)">USR:</span>
            <textarea id="terminal-input" placeholder="Type command..." rows="1"></textarea>
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport'),
              handle = document.getElementById('drag-handle'),
              editor = document.getElementById('editorPane'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              searchInput = document.getElementById('search-input'),
              matchDisplay = document.getElementById('match-count'),
              lineNumbers = document.getElementById('line-numbers'),
              gotoInput = document.getElementById('goto-input'),
              gotoBtn = document.getElementById('goto-btn'),
              forensicBtn = document.getElementById('forensic-btn'),
              loadBar = document.getElementById('load-bar'),
              loader = document.getElementById('boot-loader'),
              statusInd = document.getElementById('status-indicator'),
              chatTrigger = document.getElementById('chat-trigger'),
              chatDialog = document.getElementById('chat-dialog'),
              closeDialog = document.getElementById('close-dialog'),
              terminalInput = document.getElementById('terminal-input'),
              chatBody = document.getElementById('chat-body'),
              sendBtn = document.getElementById('send-btn');

        let isDragging = false, currentMatchIndex = -1, matchElements = [], syncTimer; 

        window.onload = () => {
            loadBar.style.width = "100%";
            setTimeout(() => {
                handleOrientation();
                updatePreview();
                updateLineNumbers();
                statusInd.innerText = "● LIVE_SYNC";
                statusInd.style.color = "var(--hud-green)";
                loader.style.opacity = "0";
                setTimeout(() => { if(loader) loader.remove(); }, 500);
                codeInput.focus();
            }, 800);
        };

        // FORENSIC SCAN REFINED
        forensicBtn.onclick = () => {
            const code = codeInput.innerText;
            chatDialog.style.display = 'flex';
            chatBody.innerHTML += `<div style="color:var(--hud-red); margin-top:10px;">> [SYSTEM]: Scanning ${code.split('\n').length} lines...</div>`;
            
            setTimeout(() => {
                const issues = [];
                if (code.includes('<script') && !code.includes('sandbox')) issues.push("XSS_RISK: Unsanitized script detected.");
                if ((code.match(/<div/g) || []).length !== (code.match(/<\/div>/g) || []).length) issues.push("SYNTAX_LEAK: Unbalanced DIV elements.");
                
                if (issues.length) issues.forEach(m => chatBody.innerHTML += `<div style="color:#ffb300">> [WARNING]: ${m}</div>`);
                else chatBody.innerHTML += `<div>> [SYSTEM]: Scan Complete. No leaks detected.</div>`;
                chatBody.scrollTop = chatBody.scrollHeight;
            }, 1000);
        };

        // SEND LOGIC
        function sendMessage() {
            const msg = terminalInput.value.trim();
            if(!msg) return;
            chatBody.innerHTML += `<div><span style="color:var(--hud-red)">USR></span> ${msg}</div>`;
            terminalInput.value = '';
            terminalInput.style.height = 'auto';
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        sendBtn.onclick = sendMessage;
        terminalInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        terminalInput.oninput = () => { terminalInput.style.height = 'auto'; terminalInput.style.height = terminalInput.scrollHeight + 'px'; };

        function updateLineNumbers() {
            const count = codeInput.innerText.split(/\n/).length;
            let nums = "";
            for(let i = 1; i <= count; i++) nums += `<div style="height:1.5em;">${i}</div>`;
            lineNumbers.innerHTML = nums;
        }

        function updatePreview() {
            const code = codeInput.innerText || "";
            const blob = new Blob([`<!DOCTYPE html><html><body style="padding:2rem;font-family:sans-serif;">${code}</body></html>`], { type: 'text/html' });
            if (preview.src) URL.revokeObjectURL(preview.src);
            preview.src = URL.createObjectURL(blob);
        }

        function handleOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            viewport.style.flexDirection = isPortrait ? 'column' : 'row';
            handle.style.width = isPortrait ? '100%' : '20px';
            handle.style.height = isPortrait ? '20px' : '100%';
            editor.style.flex = isPortrait ? '0 0 40%' : '0 0 50%';
        }

        handle.onmousedown = (e) => { isDragging = true; preview.classList.add('shield'); e.preventDefault(); };
        document.onmouseup = () => { isDragging = false; preview.classList.remove('shield'); };
        document.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = viewport.getBoundingClientRect();
            if (window.innerHeight > window.innerWidth) {
                let y = e.clientY - rect.top;
                if (y > 50 && y < rect.height - 50) editor.style.flex = `0 0 ${y}px`;
            } else {
                let x = e.clientX - rect.left;
                if (x > 100 && x < rect.width - 100) editor.style.flex = `0 0 ${x}px`;
            }
        };

        codeInput.oninput = () => { clearTimeout(syncTimer); updateLineNumbers(); syncTimer = setTimeout(updatePreview, 500); };
        chatTrigger.onclick = () => { chatDialog.style.display = 'flex'; terminalInput.focus(); };
        closeDialog.onclick = () => { chatDialog.style.display = 'none'; };
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };
        window.onresize = handleOrientation;
    </script>
</body>
</html>
