<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix | Tactical HUD Plain</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* --- THE HUD FRAME (MATCHING YOUR IMAGE) --- */
        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 90vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        /* STATIC HUD SVG OVERLAY */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .hud-bracket { fill: none; stroke: var(--hud-red); stroke-width: 3; }
        .hud-line { fill: none; stroke: var(--hud-red); stroke-width: 1; opacity: 0.5; }
        .hud-text { fill: var(--hud-red); font-size: 10px; font-weight: bold; }

        /* --- STUDIO LAYOUT --- */
        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 40px; display: flex; align-items: center; color: var(--hud-blue); font-size: 11px; letter-spacing: 2px; }

        .viewport { display: flex; flex: 1; overflow: hidden; gap: 0; }
        
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #444; border-bottom: 1px solid var(--border); }

        .code-area { 
            flex: 1; padding: 20px; color: #a1a1aa; outline: none; 
            font-size: 13px; white-space: pre-wrap; word-break: break-all; overflow-y: auto;
        }

        .drag-bar { 
            width: 4px; cursor: col-resize; background: transparent; 
            transition: 0.3s; z-index: 100;
        }
        .drag-bar:hover { background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="hud-wrapper">
        <svg class="hud-overlay" viewBox="0 0 1366 657" preserveAspectRatio="none">
            <path class="hud-bracket" d="M60,15 L15,15 L15,60" /> 
            <path class="hud-bracket" d="M1306,15 L1351,15 L1351,60" />
            <path class="hud-bracket" d="M1351,597 L1351,642 L1306,642" />
            <path class="hud-bracket" d="M15,597 L15,642 L60,642" />

            <path class="hud-line" d="M100,15 L650,15 M716,15 L1266,15" />
            <path class="hud-line" d="M100,642 L1266,642" />

            <text x="10" y="12" class="hud-text">X</text>
            <text x="1353" y="12" class="hud-text">X</text>
            <text x="1353" y="653" class="hud-text">X</text>
            <text x="10" y="653" class="hud-text">X</text>

            <rect x="673" y="10" width="20" height="10" fill="var(--hud-red)" />
        </svg>

        <div class="studio-container">
            <header class="studio-header">NEUROSENTIX_SYSTEM_CORE_v13.0</header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_CODE</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000;">VISUAL_PREVIEW</div>
                    <iframe id="preview-frame"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport'),
              handle = document.getElementById('drag-handle'),
              editor = document.getElementById('editorPane'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame');

        /* PREVIEW ENGINE (PLAIN) */
        codeInput.addEventListener('input', () => {
            const doc = preview.contentDocument;
            doc.open();
            doc.write(`<style>body{padding:2rem;font-family:sans-serif;}</style>` + codeInput.innerText);
            doc.close();
        });

        /* DRAG LOGIC */
        let isDragging = false;
        handle.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let x = e.clientX - viewport.getBoundingClientRect().left;
            if (x > 200 && x < viewport.clientWidth - 200) {
                editor.style.flex = `0 0 ${x}px`;
            }
        });

        window.onload = () => { codeInput.focus(); };
    </script>
</body>
</html>
