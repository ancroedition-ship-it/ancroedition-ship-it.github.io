<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Universal Mobile Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 60px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
            touch-action: none;
        }

        /* Responsive Container */
        .studio-container {
            width: 1366px; height: 657px;
            max-width: 100%; max-height: 100%;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 20px; border: 1px solid var(--border);
            position: relative;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); letter-spacing: 2px; font-size: 14px; }

        .studio-viewport {
            display: flex; flex: 1; 
            padding: 15px 0; overflow: hidden; position: relative;
        }

        /* DESKTOP MODE (SIDE-BY-SIDE) */
        @media (orientation: landscape) {
            .studio-viewport { flex-direction: row; }
            .middle-stack { flex: 0 0 50%; width: 50%; height: 100%; }
            .drag-bar { width: 60px; margin: 0 -30px; cursor: col-resize; height: 100%; }
            .drag-bar::after { width: 2px; height: 60px; }
        }

        /* MOBILE PORTRAIT MODE (STACKED) */
        @media (orientation: portrait) {
            .studio-viewport { flex-direction: column; }
            .middle-stack { flex: 0 0 45%; width: 100%; }
            .drag-bar { height: 60px; margin: -30px 0; cursor: row-resize; width: 100%; }
            .drag-bar::after { width: 60px; height: 2px; }
        }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; 
            overflow: hidden; height: 100%; width: 100%;
        }

        .visual-pane { flex: 1; background: #fff; min-width: 100px; min-height: 100px; }

        .drag-bar {
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; z-index: 100; touch-action: none;
        }

        .drag-bar::after {
            content: ''; background: var(--amber); 
            box-shadow: 0 0 8px var(--amber-glow);
        }

        #drag-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; display: none;
        }

        .code-area {
            flex: 1; padding: 15px; font-family: monospace;
            font-size: 13px; color: #cbd5e1; overflow-y: auto;
            outline: none; line-height: 1.5;
        }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="drag-shield"></div>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane">
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const shield = document.getElementById('drag-shield');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        
        let isDragging = false;

        function onMove(e) {
            if (!isDragging) return;
            const isPortrait = window.innerHeight > window.innerWidth;
            const rect = document.querySelector('.studio-viewport').getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            if (isPortrait) {
                // Vertical Drag (Portrait)
                let newH = clientY - rect.top;
                if (newH > 100 && newH < rect.height - 100) {
                    middleStack.style.flex = `0 0 ${newH}px`;
                    middleStack.style.height = `${newH}px`;
                    middleStack.style.width = `100%`;
                }
            } else {
                // Horizontal Drag (Landscape)
                let newW = clientX - rect.left;
                if (newW > 150 && newW < rect.width - 150) {
                    middleStack.style.flex = `0 0 ${newW}px`;
                    middleStack.style.width = `${newW}px`;
                    middleStack.style.height = `100%`;
                }
            }
        }

        handle.addEventListener('mousedown', () => { isDragging = true; shield.style.display = 'block'; });
        handle.addEventListener('touchstart', (e) => { isDragging = true; shield.style.display = 'block'; if(e.cancelable) e.preventDefault(); }, {passive: false});

        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        
        document.addEventListener('mouseup', () => { isDragging = false; shield.style.display = 'none'; });
        document.addEventListener('touchend', () => { isDragging = false; shield.style.display = 'none'; });

        // Auto-refresh Preview
        function updatePreview() {
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(`<style>body{font-family:sans-serif;padding:10px;}</style>` + codeInput.innerText);
            doc.close();
        }

        codeInput.addEventListener('input', updatePreview);
        window.onload = updatePreview;
    </script>
</body>
</html>
