<div class="studio-container">
  <header class="studio-header">
    <div class="logo">NEUROSENTIX</div>
    <nav class="view-toggle">
      <button class="toggle-btn active">Source</button>
      <button class="toggle-btn">Visual</button>
    </nav>
    <div class="user-profile">Core Studio v1.0</div>
  </header>

  <main class="studio-viewport">
    <aside class="pane text-pane">
      <div class="pane-label">EXPLORER</div>
      </aside>

    <section class="pane editor-pane">
      <div class="pane-label">SOURCE</div>
      <pre class="code-area"><code>// Start coding...</code></pre>
    </section>

    <div class="drag-bar" id="drag-handle"></div>

    <section class="pane visual-pane">
      <div class="pane-label">PREVIEW</div>
      <iframe class="output-frame" srcdoc="<html><body><h1>Visual Output</h1></body></html>"></iframe>
    </section>
  </main>
</div>
