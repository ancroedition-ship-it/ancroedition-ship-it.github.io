<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSENTIX | NEURON SVG UPDATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #0a0a0a;
            --bg-pane: #161618; 
            --accent: #f59e0b; 
            --edge-color: #27272a; 
        }
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; background: var(--bg-main); color: #e4e4e7;
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        .ui-header { 
            height: 75px; display: flex; align-items: center; 
            padding: 0 30px; border-bottom: 1px solid var(--edge-color); 
            background: #09090b; z-index: 9999; flex-shrink: 0; gap: 15px;
            position: relative;
        }

        .ns-path { 
            stroke: var(--accent); stroke-width: 2.5; fill: none; 
            stroke-linecap: round; stroke-linejoin: round;
        }

        .dock-wrapper {
            flex: 1; height: 100%; position: relative;
            display: flex; align-items: center; overflow: hidden;
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }

        #header-dock-track {
            display: flex; align-items: center; gap: 10px;
            overflow-x: scroll; height: 50px; padding: 0 10px;
            scroll-behavior: smooth;
        }
        #header-dock-track::-webkit-scrollbar { height: 3px; }
        #header-dock-track::-webkit-scrollbar-thumb { background: #1c1c1e; border-radius: 10px; }

        .header-slot {
            min-width: 110px; height: 36px; border: 1px dashed #27272a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #3f3f46; font-weight: 900; letter-spacing: 0.1em;
            flex-shrink: 0; background: rgba(255,255,255,0.01);
        }

        /* --- WORKSPACE --- */
        .split-container { 
            display: flex; flex: 1; padding: 10px; position: relative; 
            background: var(--bg-main); height: calc(100vh - 75px); overflow: hidden;
        }
        
        .pane { 
            display: flex; flex-direction: column; background: var(--bg-pane); 
            border: 1px solid var(--edge-color); border-radius: 12px; 
            overflow: hidden; position: relative;
        }
        
        #leftPane { width: 50%; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
        #rightPane { flex: 1; border-left: none; }

        .label-bar { 
            height: 48px; background: #0d0d0f; display: flex; 
            align-items: center; justify-content: space-between; 
            padding: 0 15px; border-bottom: 1px solid var(--edge-color); 
            cursor: grab; flex-shrink: 0;
        }
        .label-text { font-size: 10px; font-weight: 800; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; pointer-events: none; }

        #editor { 
            flex: 1; background: transparent; border: none; outline: none; 
            font-family: 'JetBrains Mono', monospace; font-size: 14px; 
            color: #facc15; white-space: pre-wrap; overflow-y: auto; 
            padding: 20px; position: relative; z-index: 1;
        }
        #live-preview { flex: 1; width: 100%; border: none; background: #161618; }
        
        .snap-divider { 
            width: 20px; cursor: col-resize; display: flex; 
            justify-content: center; z-index: 100; margin: 0 -10px; 
        }
        .divider-line { 
            width: 2px; background: #1a1a1c; transition: 0.2s; 
            height: 100%; pointer-events: none;
        }
        .snap-divider:hover .divider-line { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* DOCKING STATES */
        .header-slot .pane { position: absolute; inset: 0; width: 100% !important; height: 100% !important; border: none; }
        .header-slot .label-bar { height: 100%; border: none; background: transparent; justify-content: center; }
        .header-slot .label-text { color: var(--accent); font-size: 8px; }
        .header-slot #editor, .header-slot iframe, .header-slot .controls-wrap { display: none; }

        .btn-action { background: #1c1c1e; color: var(--accent); font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 4px; border: 1px solid #2d2d30; cursor: pointer; }
    </style>
</head>
<body>

    <header class="ui-header">
        <div class="flex items-center flex-shrink-0">
            <svg style="height:26px; width:90px;" viewBox="0 0 120 40">
                <path class="ns-path" d="M10,25 Q35,5 60,25" style="opacity:0.6" />
                <path class="ns-path" d="M60,25 L75,35" />
                <circle cx="10" cy="25" r="3" fill="var(--accent)" style="opacity:0.4" />
                <circle cx="60" cy="25" r="5" fill="var(--accent)" />
                <circle cx="100" cy="25" r="4" fill="var(--accent)" />
            </svg>
            <h1 style="font-size: 11px; font-weight: 900; letter-spacing: 0.3em; color: #52525b;">NEUROSENTIX</h1>
        </div>

        <div class="dock-wrapper">
            <div id="header-dock-track">
                <div class="header-slot">SLOT_01</div><div class="header-slot">SLOT_02</div>
                <div class="header-slot">SLOT_03</div><div class="header-slot">SLOT_04</div>
                <div class="header-slot">SLOT_05</div><div class="header-slot">SLOT_06</div>
                <div class="header-slot">SLOT_07</div><div class="header-slot">SLOT_08</div>
            </div>
        </div>

        <div id="status" class="flex-shrink-0" style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%;"></div>
    </header>

    <div class="split-container" id="workspace">
        <div class="pane" id="leftPane">
            <div class="label-bar" id="handle-l">
                <span class="label-text">Source</span>
                <div class="controls-wrap flex gap-2">
                    <button id="clearBtn" class="btn-action" style="color:#ef4444">CLEAR</button>
                    <button id="copyBtn" class="btn-action">COPY</button>
                </div>
            </div>
            <div id="editor" contenteditable="true" spellcheck="false"></div>
        </div>

        <div class="snap-divider" id="snap-bar"><div class="divider-line"></div></div>

        <div class="pane" id="rightPane">
            <div class="label-bar" id="handle-r"><span class="label-text">Preview</span></div>
            <iframe id="live-preview"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('live-preview');
        const leftPane = document.getElementById('leftPane');
        const workspace = document.getElementById('workspace');
        const snapBar = document.getElementById('snap-bar');
        const dockTrack = document.getElementById('header-dock-track');

        let isResizing = false;

        const update = () => {
            const doc = preview.contentDocument || preview.contentWindow.document;
            doc.open();
            doc.write(`<style>body{background:#161618;color:#f59e0b;font-family:monospace;padding:20px;line-height:1.6;} * {word-break: break-all;}</style>${editor.innerText || ""}`);
            doc.close();
        };
        editor.addEventListener('input', update);

        // Scroll Logic
        dockTrack.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) { e.preventDefault(); dockTrack.scrollLeft += e.deltaY; }
        });

        // Resize Logic
        snapBar.onmousedown = (e) => {
            isResizing = true;
            leftPane.style.transition = "none";
            document.body.style.cursor = "col-resize";
            e.preventDefault();
        };

        window.onmousemove = (e) => {
            if (!isResizing) return;
            let rect = workspace.getBoundingClientRect();
            let x = e.clientX - rect.left;
            if (x > 180 && x < rect.width - 180) { leftPane.style.width = x + 'px'; }
        };

        window.onmouseup = () => {
            if (isResizing) {
                isResizing = false;
                leftPane.style.transition = "width 0.3s cubic-bezier(0.19, 1, 0.22, 1)";
                document.body.style.cursor = "default";
            }
        };

        // Snap Logic
        workspace.onmousedown = (e) => {
            if (e.target === workspace) {
                let rect = workspace.getBoundingClientRect();
                let x = e.clientX - rect.left;
                if (x > 180 && x < rect.width - 180) { leftPane.style.width = x + 'px'; }
            }
        };

        // Drag/Dock Logic
        const setupDrag = (pane, handle) => {
            handle.onmousedown = () => pane.setAttribute('draggable', 'true');
            handle.onmouseup = () => pane.setAttribute('draggable', 'false');
            pane.ondragstart = (e) => {
                e.dataTransfer.setData('text/plain', pane.id);
                setTimeout(() => pane.style.opacity = "0.1", 0);
            };
            pane.ondragend = () => {
                pane.style.opacity = "1";
                pane.setAttribute('draggable', 'false');
            };
        };
        setupDrag(leftPane, document.getElementById('handle-l'));
        setupDrag(rightPane, document.getElementById('handle-r'));

        document.querySelectorAll('.header-slot').forEach(slot => {
            slot.ondragover = (e) => e.preventDefault();
            slot.ondrop = (e) => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text/plain');
                const el = document.getElementById(id);
                if (el) { slot.innerHTML = ""; slot.appendChild(el); checkMiddle(); }
            };
        });

        workspace.ondragover = (e) => e.preventDefault();
        workspace.ondrop = (e) => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const el = document.getElementById(id);
            if (el) {
                if (id === 'leftPane') workspace.insertBefore(el, snapBar);
                else workspace.appendChild(el);
                checkMiddle();
            }
        };

        function checkMiddle() {
            snapBar.style.display = (workspace.querySelectorAll('.pane').length === 2) ? 'flex' : 'none';
        }

        document.getElementById('copyBtn').onclick = () => navigator.clipboard.writeText(editor.innerText);
        document.getElementById('clearBtn').onclick = () => { editor.innerText = ""; update(); };
        
        update();
    </script>
</body>
</html>
