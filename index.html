<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio // V19.5_FIXED_AGNOSTIC</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
            /* CRITICAL SYNC VARIABLES */
            --editor-lh: 1.6;
            --editor-fs: 13px;
            --editor-pad: 20px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        ::-webkit-scrollbar-thumb { background: var(--hud-blue); border-radius: 10px; }

        #boot-loader {
            position: absolute; inset: 0;
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: var(--hud-blue);
            font-size: 10px; letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }

        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); transition: width 0.3s; }

        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 92vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-bracket { fill: none; stroke: var(--hud-red); stroke-width: 3; }

        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .search-container { padding: 5px 10px; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        #search-input { background: transparent; border: 1px solid var(--hud-blue); color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px 8px; outline: none; width: 100%; }
        #search-next { background: var(--hud-blue); border: none; color: white; font-size: 9px; cursor: pointer; padding: 3px 10px; display: none; border-radius: 2px; }
        #match-count { color: var(--hud-blue); font-size: 9px; white-space: nowrap; opacity: 0.6; }
        #match-count.found { color: var(--hud-red); text-shadow: 0 0 5px var(--hud-red); opacity: 1; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        #line-numbers {
            width: 50px; 
            padding: var(--editor-pad) 0;
            background: rgba(0,0,0,0.4);
            color: #333; 
            font-size: var(--editor-fs); 
            line-height: var(--editor-lh);
            text-align: center; 
            border-right: 1px solid var(--border); 
            overflow: hidden; 
            pointer-events: none;
        }

        .ln-item { display: block; width: 100%; }
        .ln-hit { 
            color: var(--hud-red) !important; 
            font-weight: bold; 
            background: rgba(255, 23, 68, 0.1);
            box-shadow: inset 2px 0 0 var(--hud-red);
        }

        .code-area { 
            flex: 1; 
            padding: var(--editor-pad); 
            color: #a1a1aa; 
            outline: none; 
            font-size: var(--editor-fs); 
            line-height: var(--editor-lh);
            white-space: pre; 
            overflow: auto; 
            user-select: text; 
        }
        
        mark { background: rgba(255, 23, 68, 0.3); color: #fff; border-radius: 1px; }
        mark.active-match { background: var(--hud-red) !important; box-shadow: 0 0 10px var(--hud-red); }

        .drag-bar { background: rgba(255,255,255,0.04); z-index: 100; width: 10px; cursor: col-resize; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX_SYNC</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper" id="main-frame">
        <svg class="hud-overlay" viewBox="0 0 1366 657" preserveAspectRatio="none">
            <path class="hud-bracket" d="M60,15 L15,15 L15,60 M1306,15 L1351,15 L1351,60 M1351,597 L1351,642 L1306,642 M15,597 L15,642 L60,642" />
        </svg>

        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX // V19.5_FIXED (A=a)</span>
                <span id="status-indicator">● LIVE_SYNC</span>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="SEARCH (A=a, B=b)..." spellcheck="false">
                        <button id="search-next">NEXT ></button>
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="plaintext-only" spellcheck="false"></div>
                    </div>
                </div>
                
                <div class="drag-bar" id="drag-handle"></div>
                
                <section class="pane preview-pane">
                    <div class="pane-label">RUNTIME_VIEW</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              lineNumbers = document.getElementById('line-numbers'),
              searchInput = document.getElementById('search-input'),
              searchNext = document.getElementById('search-next'),
              matchDisplay = document.getElementById('match-count'),
              loadBar = document.getElementById('load-bar'),
              loader = document.getElementById('boot-loader');

        let syncTimer, currentMatchIndex = -1;

        window.onload = () => {
            loadBar.style.width = "100%";
            lineNumbers.innerHTML = Array.from({length: 500}, (_, i) => 
                `<span class="ln-item" id="ln-${i+1}">${i+1}</span>`).join('');
            
            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => loader.remove(), 500);
                codeInput.focus();
            }, 600);
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updatePreview() {
            const blobContent = `<!DOCTYPE html><html><body>${codeInput.innerText}</body></html>`;
            if (preview.src) URL.revokeObjectURL(preview.src);
            const blob = new Blob([blobContent], { type: 'text/html' });
            preview.src = URL.createObjectURL(blob);
        }

        codeInput.oninput = () => {
            clearTimeout(syncTimer);
            syncTimer = setTimeout(updatePreview, 500);
        };

        /* --- UPDATED ALGORITHM: CASE-NEUTRAL --- */
        function runSearch() {
            const query = searchInput.value;
            const text = codeInput.innerText; // innerText handles newlines better than textContent

            // Clear Highlights
            document.querySelectorAll('.ln-item').forEach(el => el.classList.remove('ln-hit'));

            if (!query || query.trim() === "") {
                codeInput.innerHTML = escapeHtml(text);
                matchDisplay.innerText = "0 MATCHES";
                matchDisplay.classList.remove('found');
                searchNext.style.display = "none";
                return;
            }

            try {
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                // 'gi' flag is the engine that makes A=a, B=b
                const regex = new RegExp(`(${escapedQuery})`, 'gi'); 
                const matches = text.match(regex);
                
                if (matches) {
                    matchDisplay.classList.add('found');
                    matchDisplay.innerText = `${matches.length} MATCHES`;
                    searchNext.style.display = "block";
                    
                    // Replace using $1 to keep original character case while matching insensitively
                    codeInput.innerHTML = escapeHtml(text).replace(regex, '<mark>$1</mark>');
                    jumpToMatch(0); 
                } else {
                    matchDisplay.classList.remove('found');
                    matchDisplay.innerText = "0 MATCHES";
                    searchNext.style.display = "none";
                    codeInput.innerHTML = escapeHtml(text);
                }
            } catch (e) { console.error("Regex Error", e); }
        }

        function jumpToMatch(index) {
            const marks = codeInput.querySelectorAll('mark');
            if (marks.length === 0) return;

            marks.forEach(m => m.classList.remove('active-match'));
            currentMatchIndex = (index + marks.length) % marks.length;
            
            const target = marks[currentMatchIndex];
            target.classList.add('active-match');

            // Alignment Logic for Gutter
            const lh = parseFloat(getComputedStyle(codeInput).lineHeight);
            const pad = parseFloat(getComputedStyle(codeInput).paddingTop);
            const topPos = target.offsetTop - codeInput.offsetTop - pad;
            const lineNum = Math.floor(topPos / lh) + 1;

            document.querySelectorAll('.ln-item').forEach(el => el.classList.remove('ln-hit'));
            const ln = document.getElementById(`ln-${lineNum}`);
            if (ln) ln.classList.add('ln-hit');
            
            target.scrollIntoView({ behavior: 'auto', block: 'center' });
            matchDisplay.innerText = `${currentMatchIndex + 1} / ${marks.length} MATCHES`;
        }

        searchInput.oninput = runSearch;
        searchNext.onclick = () => jumpToMatch(currentMatchIndex + 1);
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };
    </script>
</body>
</html>
