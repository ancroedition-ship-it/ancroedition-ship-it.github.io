<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSENTIX | MASTER BUILD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #0a0a0a;
            --bg-pane: #161618; 
            --accent: #f59e0b; 
            --edge-color: #27272a; 
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background: var(--bg-main); color: #e4e4e7;
            font-family: 'Inter', sans-serif; width: 1366px; height: 650px;
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        /* --- FLOATING DOCK (OVERLAY) --- */
        #floating-sidebar {
            position: absolute; left: 15px; top: 90px; bottom: 20px;
            width: 45px; background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(15px);
            border: 1px solid var(--edge-color); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            z-index: 1000; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }
        #floating-sidebar:hover { width: 180px; align-items: flex-start; padding: 20px; border-color: #3f3f46; }
        #floating-sidebar.active-drag { border-color: var(--accent); box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
        
        .sidebar-tag { color: #3f3f46; font-size: 10px; margin-bottom: 25px; font-weight: 900; letter-spacing: 0.1em; transition: 0.2s; }
        #floating-sidebar:hover .sidebar-tag { color: var(--accent); }

        .slot-row {
            width: 140px; height: 40px; border: 1px dashed #27272a; border-radius: 8px;
            margin-bottom: 12px; display: flex; align-items: center; padding: 0 12px;
            font-size: 9px; color: #3f3f46; font-weight: 800; opacity: 0; transition: 0.2s; flex-shrink: 0;
        }
        #floating-sidebar:hover .slot-row { opacity: 1; }
        .slot-row.drag-over { border-color: var(--accent); background: rgba(245, 158, 11, 0.05); color: var(--accent); }

        /* --- HEADER --- */
        .ui-header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--edge-color); z-index: 100;
        }
        .ns-svg { height: 32px; width: auto; }
        .ns-path { stroke: var(--accent); stroke-width: 2; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: draw 3s infinite alternate; }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        /* --- STABLE MIDDLE WORKSPACE --- */
        .split-container { display: flex; flex: 1; padding: 10px; position: relative; }
        .pane { display: flex; flex-direction: column; background: var(--bg-pane); border: 1px solid var(--edge-color); border-radius: 12px; overflow: hidden; }
        
        #leftPane { width: 668px; flex-shrink: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        #rightPane { flex: 1; border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none
