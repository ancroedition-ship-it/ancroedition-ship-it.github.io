<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --hud-green: #00ff88;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
            --boundary-color: rgba(0, 102, 255, 0.2);
            --font-main: 'SF Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background-color: #000; height: 100vh; width: 100vw; display: flex; overflow: hidden; font-family: var(--font-main); user-select: none; }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: var(--hud-blue); border-radius: 10px; box-shadow: 0 0 8px var(--hud-blue); }

        /* Loader */
        #boot-loader { position: absolute; inset: 0; background: var(--bg-dark); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--hud-blue); font-size: 10px; letter-spacing: 4px; transition: opacity 0.5s ease; }
        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper { width: 100vw; height: 100vh; position: relative; background-color: var(--bg-dark); }
        .studio-container { position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; display: flex; flex-direction: column; z-index: 10; }
        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        /* Editor & UI */
        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; border: 2px solid #ccc; }
        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .editor-layout { display: flex; flex: 1; overflow: hidden; border: 2px solid var(--boundary-color); margin: 5px; }
        #line-numbers { width: 50px; padding: 20px 0; background: rgba(0,0,0,0.4); color: #333; font-size: 13px; text-align: center; border-right: 2px solid var(--boundary-color); overflow: hidden; line-height: 1.5; pointer-events: none; }
        .code-area { flex: 1; padding: 20px; color: #a1a1aa; outline: none; font-size: 13px; white-space: pre; overflow: auto; user-select: text; line-height: 1.5; border-left: 1px solid var(--border); }

        .drag-bar { background: rgba(0, 102, 255, 0.1); width: 20px; cursor: col-resize; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        .drag-bar::before { content: ""; width: 2px; height: 30%; background: var(--hud-blue); box-shadow: 0 0 8px var(--hud-blue); }

        /* Chat Overlay - Improved */
        #chat-trigger { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: var(--bg-dark); border: 2px solid var(--hud-blue); border-radius: 50%; color: var(--hud-blue); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 600; font-size: 20px; box-shadow: 0 0 10px var(--hud-blue); transition: transform 0.2s; }
        #chat-trigger:hover { transform: scale(1.1); }
        #chat-dialog { position: fixed; inset: 0; background: rgba(8, 9, 11, 0.98); z-index: 900; display: none; flex-direction: column; padding: 30px; }
        #chat-body { flex: 1; margin-top: 20px; border: 1px solid var(--boundary-color); padding: 20px; color: #ccc; font-size: 13px; overflow-y: auto; line-height: 1.6; font-family: sans-serif; }
        #chat-body code { background: #1a1a1a; padding: 2px 4px; border-radius: 4px; color: var(--hud-green); }
        #chat-body pre { background: #000 !important; border: 1px solid var(--border); padding: 15px; border-radius: 5px; overflow-x: auto; }
        
        .chat-input-wrapper { margin-top: 15px; display: flex; gap: 10px; border: 1px solid var(--boundary-color); padding: 10px; align-items: center; }
        #terminal-input { flex: 1; background: transparent; border: none; outline: none; color: var(--hud-red); font-family: var(--font-main); font-size: 14px; }
        
        iframe { width: 100%; height: 100%; border: none; }
        .shield { pointer-events: none !important; }
        .ln-mark { color: var(--hud-red) !important; font-weight: bold; background: rgba(255, 23, 68, 0.1); }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX_OS</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper">
        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX STUDIO v2.0</span>
                <div class="nav-tools">
                    <input type="number" id="goto-input" style="width:50px; background:transparent; border:1px solid var(--border); color:var(--hud-blue); font-size:10px;" placeholder="LN">
                    <span id="status-indicator">● OFFLINE</span>
                </div>
            </header>
            
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000;">RUNTIME_VIEW</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <div id="chat-trigger">◈</div>
    <div id="chat-dialog">
        <div style="display:flex; justify-content:space-between; color:var(--hud-red); font-size:11px; letter-spacing:3px;">
            <span>NEURAL_CHAT_LINK</span>
            <span id="close-dialog" style="cursor:pointer;">[ CLOSE_X ]</span>
        </div>
        <div id="chat-body">> [SYSTEM]: Connection Secure. Ask me for code or fixes.</div>
        <div class="chat-input-wrapper">
            <span style="color:var(--hud-red)">CMD></span>
            <input type="text" id="terminal-input" placeholder="Type a request..." autocomplete="off">
        </div>
    </div>

    <script src="config.js?v=2"></script>

    <script>
        const codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              lineNumbers = document.getElementById('line-numbers'),
              loadBar = document.getElementById('load-bar'),
              loader = document.getElementById('boot-loader'),
              statusInd = document.getElementById('status-indicator'),
              chatTrigger = document.getElementById('chat-trigger'),
              chatDialog = document.getElementById('chat-dialog'),
              terminalInput = document.getElementById('terminal-input'),
              chatBody = document.getElementById('chat-body');

        let syncTimer;

        // --- INITIALIZATION ---
        window.onload = () => {
            loadBar.style.width = "100%";
            setTimeout(() => {
                updateLineNumbers();
                updatePreview();
                if (typeof GROQ_CONFIG !== 'undefined') {
                    statusInd.innerText = "● LIVE_SYNC";
                    statusInd.style.color = "var(--hud-green)";
                }
                loader.style.opacity = "0";
                setTimeout(() => loader.remove(), 500);
            }, 800);
        };

        function updateLineNumbers() {
            let nums = "";
            for(let i = 1; i <= 999; i++) nums += `<div style="height:1.5em;">${i}</div>`;
            lineNumbers.innerHTML = nums;
        }

        function updatePreview() {
            const code = codeInput.innerText || "";
            const blob = new Blob([`<!DOCTYPE html><html><head><style>body{padding:20px;font-family:sans-serif;}</style></head><body>${code}</body></html>`], {type:'text/html'});
            if(preview.src) URL.revokeObjectURL(preview.src);
            preview.src = URL.createObjectURL(blob);
        }

        codeInput.oninput = () => {
            clearTimeout(syncTimer);
            syncTimer = setTimeout(updatePreview, 600);
        };

        // --- CHAT LOGIC ---
        chatTrigger.onclick = () => { chatDialog.style.display = 'flex'; terminalInput.focus(); };
        document.getElementById('close-dialog').onclick = () => chatDialog.style.display = 'none';

        terminalInput.onkeydown = async (e) => {
            if (e.key === 'Enter' && terminalInput.value.trim() !== "") {
                const userMsg = terminalInput.value;
                terminalInput.value = "";
                
                chatBody.innerHTML += `<div style="margin-bottom:15px;"><b style="color:var(--hud-red)">USER:</b> ${userMsg}</div>`;
                const aiId = "ai-" + Date.now();
                chatBody.innerHTML += `<div id="${aiId}" style="margin-bottom:20px; border-left:2px solid var(--hud-blue); padding-left:10px; opacity:0.7">...THINKING...</div>`;
                chatBody.scrollTop = chatBody.scrollHeight;

                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${GROQ_CONFIG.API_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: GROQ_CONFIG.MODEL,
                            messages: [
                                { role: "system", content: "You are Neurosentix AI. Provide precise code snippets. Use markdown." },
                                { role: "user", content: userMsg }
                            ]
                        })
                    });
                    const data = await response.json();
                    const rawContent = data.choices[0].message.content;
                    
                    // Render Markdown & Code Highlighting
                    document.getElementById(aiId).style.opacity = "1";
                    document.getElementById(aiId).innerHTML = `<b style="color:var(--hud-blue)">AI:</b><br>${marked.parse(rawContent)}`;
                    Prism.highlightAll();
                } catch (err) {
                    document.getElementById(aiId).innerHTML = `<span style="color:var(--hud-red)">CONNECTION_ERROR</span>`;
                }
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        };

        // Sync scrolling
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };
    </script>
</body>
</html>
