<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Core</title>
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #0a0a0f;
            /* Syntax Palette */
            --syn-tag: #ff79c6;   /* HTML/XML Tags */
            --syn-attr: #50fa7b;  /* Attributes */
            --syn-str: #f1fa8c;   /* Strings */
            --syn-comm: #6272a4;  /* Comments */
            --syn-val: #bd93f9;   /* Numbers/Values */
        }

        body, html {
            margin: 0; padding: 0; background: #000;
            height: 100vh; width: 100vw; display: flex; 
            justify-content: center; align-items: center;
            font-family: 'Fira Code', 'Courier New', monospace;
            overflow: hidden; color: #fff;
        }

        /* --- THE HUD STRUCTURE --- */
        .hud-wrapper {
            width: 1366px; height: 657px; max-width: 95vw; max-height: 92vh;
            position: relative; background: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .viewport {
            position: absolute; top: 40px; left: 20px; right: 20px; bottom: 20px;
            display: flex; gap: 10px;
        }

        /* --- THE OMNI-EDITOR (STABILIZED) --- */
        .editor-container {
            flex: 0 0 50%; position: relative;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
        }

        /* The hidden brain that captures typing */
        #main-input {
            position: absolute; inset: 0; width: 100%; height: 100%;
            padding: 20px; background: transparent; color: transparent;
            caret-color: var(--hud-blue); border: none; outline: none;
            resize: none; font-family: inherit; font-size: 14px;
            line-height: 1.5; z-index: 2; white-space: pre; overflow: auto;
        }

        /* The visual layer that shows the colors */
        #syntax-display {
            position: absolute; inset: 0; width: 100%; height: 100%;
            padding: 20px; pointer-events: none; z-index: 1;
            white-space: pre; font-size: 14px; line-height: 1.5;
            overflow: hidden;
        }

        .preview-pane { flex: 1; background: #fff; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Syntax Classes */
        .s-tag { color: var(--syn-tag); font-weight: bold; }
        .s-attr { color: var(--syn-attr); }
        .s-str { color: var(--syn-str); }
        .s-comm { color: var(--syn-comm); font-style: italic; }
        .s-val { color: var(--syn-val); }

        /* Dragbar 20px */
        .drag-bar { width: 20px; cursor: col-resize; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; }
        .drag-bar:hover { background: rgba(0, 102, 255, 0.1); }
    </style>
</head>
<body>

    <div class="hud-wrapper">
        <div style="padding: 10px 20px; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px;">
            NEUROSENTIX_CORE // OMNI_COMPILER_V15.5
        </div>

        <div class="viewport" id="viewport">
            <div class="editor-container" id="edit-box">
                <pre id="syntax-display"></pre>
                <textarea id="main-input" spellcheck="false" autocomplete="off">
<svg width="100" height="100">
  <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
</svg>

<style>
  body { background: #f0f0f0; }
  h1 { color: #0066ff; }
</style>

<h1>System Active</h1>

<script>
  console.log("Omni-Editor: Online");
</script></textarea>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <div class="preview-pane">
                <iframe id="preview-frame"></iframe>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('main-input');
        const display = document.getElementById('syntax-display');
        const preview = document.getElementById('preview-frame');
        const handle = document.getElementById('drag-handle');
        const editBox = document.getElementById('edit-box');

        // MULTI-LANGUAGE HIGHLIGHTER (HTML, XML, SVG, CSS, JS)
        function highlight(code) {
            return code
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                // Tags: <tagname or </tagname
                .replace(/(&lt;\/?[a-zA-Z0-9]+)/g, '<span class="s-tag">$1</span>')
                // Attributes: attr="value"
                .replace(/\b([a-zA-Z\-]+)(?==)/g, '<span class="s-attr">$1</span>')
                // Strings: "..." or '...'
                .replace(/(['"])(.*?)\1/g, '<span class="s-str">$1$2$1</span>')
                // Comments: or //
                .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="s-comm">$1</span>')
                .replace(/\/\/.*/g, '<span class="s-comm">$&</span>')
                // Numbers
                .replace(/\b(\d+px|\d+%|\d+)\b/g, '<span class="s-val">$1</span>');
        }

        function update() {
            // Sync Display
            display.innerHTML = highlight(input.value) + "\n\n";
            display.scrollTop = input.scrollTop;
            display.scrollLeft = input.scrollLeft;

            // Sync Preview (Injection)
            const blob = new Blob([input.value], {type: 'text/html'});
            if(preview.src) URL.revokeObjectURL(preview.src);
            preview.src = URL.createObjectURL(blob);
        }

        // Stabilized Interaction Logic
        input.addEventListener('input', update);
        input.addEventListener('scroll', () => {
            display.scrollTop = input.scrollTop;
            display.scrollLeft = input.scrollLeft;
        });

        // 20px Drag Logic
        let isDragging = false;
        handle.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = document.getElementById('viewport').getBoundingClientRect();
            let x = e.clientX - rect.left;
            if (x > 50 && x < rect.width - 50) editBox.style.flex = `0 0 ${x}px`;
        });

        // Initial Boot
        window.onload = update;
    </script>
</body>
</html>
