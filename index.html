<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix Studio</title>
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --hud-green: #00ff88;
            --bg-dark: #08090b;
            --border: rgba(0, 102, 255, 0.2);
            --font-main: 'SF Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background: #000; height: 100vh; width: 100vw; 
            overflow: hidden; font-family: var(--font-main); color: var(--hud-blue);
        }

        /* HEADER */
        .studio-header {
            height: 40px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-size: 10px; letter-spacing: 2px;
        }

        .forensic-status { display: flex; align-items: center; gap: 15px; }
        #forensic-btn { 
            background: transparent; border: 1px solid var(--hud-red); color: var(--hud-red);
            font-size: 8px; cursor: pointer; padding: 2px 8px; font-family: inherit;
        }

        /* MAIN VIEWPORT */
        .viewport {
            display: flex; height: calc(100vh - 40px); width: 100vw;
            border-top: 1px solid var(--border);
        }

        .pane { display: flex; flex-direction: column; overflow: hidden; }
        
        /* EDITOR PANE */
        .editor-pane { flex: 0 0 50%; border-right: 1px solid var(--border); background: var(--bg-dark); }
        
        .search-container {
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        #search-input {
            background: transparent; border: none; color: var(--hud-blue);
            font-family: inherit; font-size: 11px; outline: none; width: 80%;
        }
        #match-count { color: var(--hud-red); font-size: 9px; font-weight: bold; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Gutter & Search Highlight */
        #line-numbers {
            width: 45px; padding: 20px 0; background: rgba(0,0,0,0.3);
            color: rgba(0, 102, 255, 0.3); font-size: 13px; text-align: center;
            border-right: 1px solid var(--border); line-height: 1.5; pointer-events: none;
        }
        .ln-mark { 
            color: var(--hud-red) !important; background: rgba(255, 23, 68, 0.15);
            text-shadow: 0 0 5px var(--hud-red);
        }

        .code-area {
            flex: 1; padding: 20px; color: #a1a1aa; outline: none;
            font-size: 13px; white-space: pre; overflow: auto; line-height: 1.5;
            -webkit-user-modify: read-write-plaintext-only;
        }

        /* DRAG BAR */
        .drag-bar {
            width: 4px; background: var(--bg-dark); cursor: col-resize;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        .drag-bar::after { content: ""; width: 2px; height: 20px; background: var(--hud-blue); }

        /* PREVIEW */
        .preview-pane { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SVG ROTATION LOGIC */
        .horizontal-svg { transform: rotate(90deg); transform-origin: center; }
    </style>
</head>
<body>

    <header class="studio-header">
        <span>CORE_V3 // TERMINAL</span>
        <div class="forensic-status">
            <button id="forensic-btn" onclick="toggleForensic()">FORENSIC_SCAN: OFF</button>
            <span style="color:var(--hud-green)">● ONLINE</span>
        </div>
    </header>

    <main class="viewport" id="viewport">
        <div class="pane editor-pane" id="editor-pane">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="SEARCH_CODE..." autocomplete="off" spellcheck="false">
                <span id="match-count">0_MATCHES</span>
            </div>
            <div class="editor-layout">
                <div id="line-numbers"></div>
                <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>

        <div class="drag-bar" id="drag-handle"></div>

        <section class="pane preview-pane">
            <iframe id="preview-frame"></iframe>
        </section>
    </main>

<script>
    const codeInput = document.getElementById('code-input');
    const lineNumbers = document.getElementById('line-numbers');
    const searchInput = document.getElementById('search-input');
    const matchCount = document.getElementById('match-count');
    const preview = document.getElementById('preview-frame');
    const dragHandle = document.getElementById('drag-handle');
    const editorPane = document.getElementById('editor-pane');

    let forensicActive = false;
    let syncTimer;

    // --- LINE SYNC & SEARCH GLOW ---
    function updateUI() {
        const query = searchInput.value.toLowerCase();
        const lines = codeInput.innerText.split('\n');
        let matches = 0;
        let html = "";

        lines.forEach((line, i) => {
            const hasMatch = query && line.toLowerCase().includes(query);
            if(hasMatch) matches++;
            html += `<div class="${hasMatch ? 'ln-mark' : ''}" style="height:1.5em;">${i+1}</div>`;
        });

        lineNumbers.innerHTML = html;
        matchCount.innerText = `${matches}_MATCHES`;
        lineNumbers.scrollTop = codeInput.scrollTop;
    }

    // --- RENDER ENGINE ---
    function render() {
        const code = codeInput.innerText;
        const rotateClass = forensicActive ? 'class="horizontal-svg"' : '';
        const doc = `<html><body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#fff;">${code.replace('<svg', '<svg ' + rotateClass)}</body></html>`;
        preview.srcdoc = doc;
        updateUI();
    }

    function toggleForensic() {
        forensicActive = !forensicActive;
        document.getElementById('forensic-btn').innerText = `FORENSIC_SCAN: ${forensicActive ? 'ON' : 'OFF'}`;
        render();
    }

    // --- DRAG BAR LOGIC ---
    let dragging = false;
    dragHandle.onmousedown = () => dragging = true;
    document.onmouseup = () => dragging = false;
    document.onmousemove = (e) => {
        if (!dragging) return;
        let x = e.clientX;
        if (x > 100 && x < window.innerWidth - 100) {
            editorPane.style.flex = `0 0 ${x}px`;
            // Trigger UI update to keep lines synced during drag
            updateUI();
        }
    };

    // EVENTS
    codeInput.oninput = () => { clearTimeout(syncTimer); syncTimer = setTimeout(render, 300); };
    searchInput.oninput = updateUI;
    codeInput.onscroll = () => lineNumbers.scrollTop = codeInput.scrollTop;

    // INIT
    window.onload = () => {
        codeInput.innerText = '<svg viewBox="0 0 100 100">\n  <rect x="10" y="10" width="80" height="80" fill="#0066ff"/>\n</svg>';
        render();
    };
</script>
</body>
</html>
