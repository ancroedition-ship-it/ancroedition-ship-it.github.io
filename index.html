<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix | Full-Stack Tactical HUD</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* --- THE HUD FRAME --- */
        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 90vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .hud-bracket { fill: none; stroke: var(--hud-red); stroke-width: 3; }
        .hud-text { fill: var(--hud-red); font-size: 10px; font-weight: bold; }

        /* --- STUDIO LAYOUT --- */
        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .code-area { 
            flex: 1; padding: 20px; color: #a1a1aa; outline: none; 
            font-size: 13px; white-space: pre-wrap; word-break: break-all; overflow-y: auto;
            tab-size: 4;
        }

        .drag-bar { 
            width: 4px; cursor: col-resize; background: transparent; 
            transition: 0.2s; z-index: 100;
        }
        .drag-bar:hover { background: var(--hud-red); }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="hud-wrapper">
        <svg class="hud-overlay" viewBox="0 0 1366 657" preserveAspectRatio="none">
            <path class="hud-bracket" d="M60,15 L15,15 L15,60 M1306,15 L1351,15 L1351,60 M1351,597 L1351,642 L1306,642 M15,597 L15,642 L60,642" />
            <text x="10" y="12" class="hud-text">X</text>
            <text x="1353" y="12" class="hud-text">X</text>
            <rect x="673" y="10" width="20" height="10" fill="var(--hud-red)" />
        </svg>

        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX_OMNI_EDITOR_v14.0</span>
                <span id="status-indicator" style="color: var(--hud-red); font-weight: bold;">● LIVE_SYNC</span>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">MULTI-LAYER_SOURCE (HTML / CSS / JS / SVG)</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000;">UNIFIED_RUNTIME</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editorPane'),
              handle = document.getElementById('drag-handle'),
              viewport = document.getElementById('viewport'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              status = document.getElementById('status-indicator');

        let debounceTimer;
        let currentBlobUrl = null;

        function updatePreview() {
            status.style.opacity = "0.5";
            const userContent = codeInput.innerText;
            
            // This structure accepts everything: SVG, Scripts, Styles, and HTML
            const blobContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Runtime</title>
                </head>
                <body>
                    ${userContent}
                </body>
                </html>
            `;

            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            const blob = new Blob([blobContent], { type: 'text/html' });
            currentBlobUrl = URL.createObjectURL(blob);
            preview.src = currentBlobUrl;
            
            setTimeout(() => { status.style.opacity = "1"; }, 300);
        }

        codeInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updatePreview, 600); 
        });

        /* DRAG LOGIC */
        let isDragging = false;
        handle.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let x = e.clientX - viewport.getBoundingClientRect().left;
            if (x > 200 && x < viewport.clientWidth - 200) {
                editor.style.flex = `0 0 ${x}px`;
            }
        });

        window.onload = () => { 
            // Default Multilayer Template
            const defaultTemplate = 
`<style>
  body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center; }
  h1 { color: #0066ff; font-family: sans-serif; }
  .box { transition: transform 0.3s; cursor: pointer; }
  .box:hover { transform: scale(1.1); }
</style>

<h1>System Operational</h1>
<svg width="100" height="100" class="box" onclick="sync()">
  <rect width="100" height="100" fill="#ff1744" rx="15" />
  <text x="50" y="55" fill="white" text-anchor="middle" font-family="sans-serif">PUSH</text>
</svg>

<script>
  function sync() {
    alert("Data Synchronized Successfully.");
    console.log("HUD Handshake Complete");
  }
<\/script>`;
            
            codeInput.innerText = defaultTemplate;
            updatePreview(); 
            codeInput.focus(); 
        };
    </script>
</body>
</html>
