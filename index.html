<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Universal PC Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 64px;
            --fixed-width: 1366px;
            --fixed-height: 657px;
        }

        /* Block Zoom & Scrolling on Body */
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none;
            -webkit-text-size-adjust: 100%;
        }

        /* THE HARD-LOCKED CONTAINER */
        .studio-container {
            width: var(--fixed-width); 
            height: var(--fixed-height);
            background-color: var(--bg-dark);
            display: flex; 
            flex-direction: column;
            padding: 0 32px; 
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,0,0,1);
            position: relative;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); letter-spacing: 2px; }

        /* VIEWPORT: Side-by-Side Forced */
        .studio-viewport {
            display: flex; 
            flex-direction: row !important; 
            flex: 1; 
            padding: 20px 0;
            height: calc(var(--fixed-height) - var(--header-h)); 
            overflow: hidden;
            align-items: stretch;
        }

        .middle-stack {
            display: flex; 
            flex-direction: column;
            flex: 0 0 600px; 
            height: 100%;
            min-width: 250px;
        }

        .pane {
            background: var(--panel-bg); 
            border: 1px solid var(--border);
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Hard clip for horizontal */
            height: 100%;
        }

        .visual-pane { 
            flex: 1; 
            background: #ffffff; 
            min-width: 250px;
        }

        .pane-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            padding: 10px 16px; background: rgba(255, 255, 255, 0.02);
            color: var(--amber); border-bottom: 1px solid var(--border);
            font-weight: bold;
            user-select: none;
        }

        /* EDITOR: No Horizontal Scroll, Stealth Vertical Scroll */
        .code-area::-webkit-scrollbar { width: 4px; }
        .code-area::-webkit-scrollbar-track { background: transparent; }
        .code-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .code-area:hover::-webkit-scrollbar-thumb { background: var(--amber); }

        .code-area {
            flex: 1; 
            padding: 20px; 
            font-family: Arial, sans-serif;
            font-size: 14px; 
            color: #cbd5e1; 
            overflow-y: auto;       /* Vertical Scroll Only */
            overflow-x: hidden;     /* Kill Horizontal Scroll */
            white-space: pre-wrap;   /* Wrap at spaces */
            word-break: break-all;   /* Force wrap long strings */
            outline: none; 
            line-height: 1.5;
            caret-color: var(--amber);
        }

        /* REINFORCED DRAG-BAR */
        .drag-bar {
            width: 20px; 
            cursor: col-resize; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0;
            user-select: none;
        }

        .drag-bar::after {
            content: ''; width: 2px; height: 60px; 
            background: var(--amber); 
            box-shadow: 0 0 8px var(--amber-glow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .drag-bar:active::after {
            transform: scaleX(2.5);
            box-shadow: 0 0 15px var(--amber);
        }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f8f9fa; color: #999;">Visual Output</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        
        let isDragging = false;
        let debounceTimer;

        // 1. ZOOM LOCK (Ctrl + Wheel & Keys)
        window.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (['=', '-', '0', '+'].includes(e.key))) e.preventDefault();
        });

        // 2. REINFORCED CLICK-TO-DRAG ENGINE
        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'col-resize';
            preview.style.pointerEvents = 'none'; // Prevents iframe focus theft
            e.preventDefault();
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = 'default';
                preview.style.pointerEvents = 'all';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerRect = document.querySelector('.studio-container').getBoundingClientRect();
            let newWidth = e.clientX - containerRect.left - 32;

            // Bounds Lock: 250px min, 1000px max
            if (newWidth > 250 && newWidth < 1000) {
                middleStack.style.flex = `0 0 ${newWidth}px`;
            }
        });

        // 3. PREVIEW RENDERER (Anti-Crush)
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const content = codeInput.innerText;
                const doc = preview.contentDocument || preview.contentWindow.document;
                
                // Shield prevents horizontal scroll in preview
                const shield = `
                    <style>
                        html, body { 
                            margin: 0; padding: 20px; 
                            width: 100%; min-height: 100vh; 
                            word-wrap: break-word; overflow-x: hidden; 
                            font-family: Arial, sans-serif; background: #fff; color: #000;
                        }
                        * { box-sizing: border-box; }
                    </style>`;
                
                doc.open();
                doc.write(shield + content);
                doc.close();
            }, 400);
        }

        // 4. CLEAN PASTE (No formatting)
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        // 5. SYNC SCROLL
        codeInput.addEventListener('scroll', () => {
            const editorScrollTop = codeInput.scrollTop;
            const editorScrollHeight = codeInput.scrollHeight - codeInput.clientHeight;
            const scrollPercentage = editorScrollTop / (editorScrollHeight || 1);
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            const previewScrollHeight = previewDoc.documentElement.scrollHeight - preview.clientHeight;
            preview.contentWindow.scrollTo(0, scrollPercentage * previewScrollHeight);
        });

        // INITIALIZE
        codeInput.addEventListener('input', updatePreview);
        window.onload = () => {
            updatePreview();
            codeInput.focus(); // Instant Start
        };
    </script>
</body>
</html>
