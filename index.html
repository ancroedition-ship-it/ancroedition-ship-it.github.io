<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
            user-select: none;
        }

        /* --- TACTICAL SCROLLBARS --- */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { 
            background: var(--hud-blue); 
            border-radius: 10px; 
            box-shadow: 0 0 8px var(--hud-blue); 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--hud-red); 
            box-shadow: 0 0 12px var(--hud-red); 
        }

        #boot-loader {
            position: absolute; inset: 0;
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: var(--hud-blue);
            font-size: 10px; letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }

        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 92vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
            transition: border 0.2s;
        }

        .hud-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .hud-bracket { fill: none; stroke: var(--hud-red); stroke-width: 3; }
        .hud-text { fill: var(--hud-red); font-size: 10px; font-weight: bold; }

        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .nav-tools { display: flex; align-items: center; gap: 15px; }
        .hud-input-small { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--hud-blue); 
            font-size: 9px; padding: 2px 5px; width: 60px; outline: none; transition: border 0.2s;
        }
        .hud-input-small:focus { border-color: var(--hud-red); }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #333; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .search-container { padding: 5px 10px; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        #search-input { background: transparent; border: 1px solid var(--hud-blue); color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px 8px; outline: none; width: 100%; }
        #match-count { color: var(--hud-blue); font-size: 9px; margin-left: 10px; white-space: nowrap; opacity: 0.6; transition: all 0.2s; }
        #match-count.found { color: var(--hud-red); text-shadow: 0 0 5px var(--hud-red); opacity: 1; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        #line-numbers {
            width: 45px; padding: 20px 8px; background: rgba(0,0,0,0.4);
            color: #333; font-size: 12px; text-align: right; 
            border-right: 1px solid var(--border); overflow: hidden; line-height: 1.5; pointer-events: none;
        }
        .code-area { 
            flex: 1; padding: 20px; color: #a1a1aa; outline: none; 
            font-size: 13px; white-space: pre; overflow: auto; 
            user-select: text; line-height: 1.5; 
        }
        
        mark { background: rgba(255, 23, 68, 0.5); color: #fff; border-radius: 1px; box-shadow: 0 0 8px rgba(255, 23, 68, 0.5); }

        .drag-bar { background: rgba(255, 255, 255, 0.04); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .drag-bar.active { background: rgba(255, 23, 68, 0.2); box-shadow: inset 0 0 10px var(--hud-red); }
        .drag-bar::before { content: ""; width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; box-shadow: 0 8px 0 rgba(255,255,255,0.3), 0 -8px 0 rgba(255,255,255,0.3); }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }
        .shield { pointer-events: none !important; }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper" id="main-frame">
        <svg class="hud-overlay" viewBox="0 0 1366 657" preserveAspectRatio="none">
            <path class="hud-bracket" d="M60,15 L15,15 L15,60 M1306,15 L1351,15 L1351,60 M1351,597 L1351,642 L1306,642 M15,597 L15,642 L60,642" />
            <text x="10" y="12" class="hud-text">X</text><text x="1353" y="12" class="hud-text">X</text>
        </svg>

        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX_CORE // V16.5</span>
                <div class="nav-tools">
                    <span style="opacity: 0.5;">GOTO_LN:</span>
                    <input type="number" id="goto-input" class="hud-input-small" placeholder="000">
                    <span id="status-indicator">● LIVE_SYNC</span>
                </div>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="SEARCH_SOURCE..." spellcheck="false">
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers">1</div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                
                <div class="drag-bar" id="drag-handle"></div>
                
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000; display: flex; justify-content: space-between; align-items: center; padding: 4px 10px;">
                        <span>RUNTIME</span>
                        <span id="lock-btn" style="cursor: pointer; display: flex; align-items: center;" title="Toggle Runtime Lock">
                            <svg id="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #000; transition: all 0.2s;">
                                <path id="lock-path" d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            </svg>
                        </span>
                    </div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport'),
              handle = document.getElementById('drag-handle'),
              editor = document.getElementById('editorPane'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              status = document.getElementById('status-indicator'),
              loadBar = document.getElementById('load-bar'),
              loader = document.getElementById('boot-loader'),
              searchInput = document.getElementById('search-input'),
              matchDisplay = document.getElementById('match-count'),
              lineNumbers = document.getElementById('line-numbers'),
              gotoInput = document.getElementById('goto-input'),
              lockBtn = document.getElementById('lock-btn'),
              lockIcon = document.getElementById('lock-icon'),
              lockPath = document.getElementById('lock-path');

        let isDragging = false;
        let isRuntimeLocked = false;

        /* BOOT SEQUENCE */
        window.onload = () => {
            loadBar.style.width = "100%";
            setTimeout(() => {
                handleOrientation();
                updatePreview();
                updateLineNumbers();
                loader.style.opacity = "0";
                setTimeout(() => loader.remove(), 500);
                codeInput.focus();
            }, 600);
        };

        /* ADAPTIVE LAYOUT */
        function handleOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            viewport.style.flexDirection = isPortrait ? 'column' : 'row';
            handle.style.width = isPortrait ? '100%' : '20px';
            handle.style.height = isPortrait ? '20px' : '100%';
            handle.style.cursor = isPortrait ? 'row-resize' : 'col-resize';
            editor.style.flex = isPortrait ? '0 0 40%' : '0 0 50%';
        }

        /* DRAG ENGINE */
        handle.onmousedown = () => { isDragging = true; handle.classList.add('active'); preview.classList.add('shield'); };
        document.onmouseup = () => { isDragging = false; handle.classList.remove('active'); preview.classList.remove('shield'); };
        document.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = viewport.getBoundingClientRect();
            if (window.innerHeight > window.innerWidth) {
                let y = e.clientY - rect.top;
                if (y > 40 && y < rect.height - 40) editor.style.flex = `0 0 ${y}px`;
            } else {
                let x = e.clientX - rect.left;
                if (x > 100 && x < rect.width - 100) editor.style.flex = `0 0 ${x}px`;
            }
        };

        /* LINE COUNTER (1-999) */
        function updateLineNumbers() {
            let nums = "";
            for(let i = 1; i <= 999; i++) {
                nums += i + "<br>";
            }
            lineNumbers.innerHTML = nums;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /* GOTO LINE */
        gotoInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const lineNum = parseInt(gotoInput.value);
                const lineHeight = parseFloat(window.getComputedStyle(codeInput).lineHeight);
                if (lineNum > 0) {
                    codeInput.scrollTop = (lineNum - 1) * lineHeight;
                    gotoInput.blur();
                }
            }
        };

        /* RUNTIME LOCK SYSTEM */
        lockBtn.onclick = () => {
            isRuntimeLocked = !isRuntimeLocked;
            if (isRuntimeLocked) {
                lockIcon.style.color = "var(--hud-red)";
                lockPath.setAttribute("d", "M7 11V7a5 5 0 0 1 10 0v4"); // Closed
                status.innerText = "● SYNC_PAUSED";
                status.style.color = "var(--hud-red)";
            } else {
                lockIcon.style.color = "#000";
                lockPath.setAttribute("d", "M7 11V7a5 5 0 0 1 9.9-1"); // Open
                status.innerText = "● LIVE_SYNC";
                status.style.color = "var(--hud-blue)";
                updatePreview();
            }
        };

        /* ROBUST SEARCH ENGINE */
        searchInput.oninput = () => {
            const query = searchInput.value;
            const text = codeInput.innerText;

            if (!query || query.trim() === "") {
                codeInput.innerHTML = escapeHtml(text);
                matchDisplay.innerText = "0 MATCHES";
                matchDisplay.classList.remove('found');
                return;
            }

            try {
                const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(${escapedQuery})`, 'gi');
                const matches = text.match(regex);
                matchDisplay.innerText = `${matches ? matches.length : 0} MATCHES`;

                if (matches) {
                    matchDisplay.classList.add('found');
                    codeInput.innerHTML = escapeHtml(text).replace(regex, '<mark>$1</mark>');
                    const firstMatch = codeInput.querySelector('mark');
                    if (firstMatch) {
                        firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    matchDisplay.classList.remove('found');
                    codeInput.innerHTML = escapeHtml(text);
                }
            } catch (e) { console.error(e); }
        };

        /* FOCUS PROTECTION */
        codeInput.onfocus = () => {
            if (searchInput.value !== "") {
                const raw = codeInput.innerText;
                codeInput.innerHTML = escapeHtml(raw);
                searchInput.value = "";
                matchDisplay.innerText = "0 MATCHES";
                matchDisplay.classList.remove('found');
            }
        };

        /* SCROLL SYNC */
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };

        /* RUNTIME PREVIEW */
        function updatePreview() {
            const code = codeInput.innerText;
            const blobContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{padding:2rem;font-family:sans-serif;}</style></head><body>${code}</body></html>`;
            if (preview.src) URL.revokeObjectURL(preview.src);
            const blob = new Blob([blobContent], { type: 'text/html' });
            preview.src = URL.createObjectURL(blob);
        }

        codeInput.oninput = () => { 
            if (!isRuntimeLocked) updatePreview(); 
        };
        
        window.onresize = handleOrientation;
    </script>
</body>
</html>
