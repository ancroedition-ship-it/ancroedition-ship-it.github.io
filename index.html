<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix AI Chatbot</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --header-bg: #334155;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --border-color: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #chat-container {
            width: 100%;
            height: 100%;
            max-width: 600px;
            background: var(--container-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        header {
            padding: 15px;
            background: var(--header-bg);
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
            letter-spacing: 1px;
        }

        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--accent-blue);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--header-bg);
            border-bottom-left-radius: 2px;
        }

        #input-area {
            display: flex;
            padding: 15px;
            background: var(--container-bg);
            border-top: 1px solid var(--border-color);
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: white;
            font-size: 16px; /* Prevents auto-zoom on iOS */
            outline: none;
        }

        button {
            padding: 0 20px;
            background: var(--accent-blue);
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            touch-action: manipulation;
        }

        button:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <header>NEUROSENTIX AI</header>
        <div id="chat-display"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask Neurosentix..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            API_KEY: "YOUR_GROQ_API_KEY_HERE", 
            MODEL: "llama3-8b-8192",
            // Using a CORS proxy to allow mobile browser requests
            PROXY_URL: "https://corsproxy.io/?" 
        };

        const chatDisplay = document.getElementById('chat-display');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show User Message
            appendMessage('user', text);
            userInput.value = '';
            
            // 2. Prepare API Call
            const apiEndpoint = "https://api.groq.com/openai/v1/chat/completions";
            
            try {
                const response = await fetch(CONFIG.PROXY_URL + apiEndpoint, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${CONFIG.API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: text }],
                        model: CONFIG.MODEL
                    })
                });

                if (!response.ok) throw new Error(`Status: ${response.status}`);

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                // 3. Show AI Response
                appendMessage('bot', aiResponse);
            } catch (err) {
                console.error(err);
                appendMessage('bot', "Connection failed. Please check your API key.");
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            chatDisplay.appendChild(div);
            
            // Smooth scroll to bottom
            chatDisplay.scrollTo({
                top: chatDisplay.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Handle both Click and Touch for mobile responsiveness
        sendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            sendMessage();
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
                userInput.blur(); // Hides keyboard on mobile after sending
            }
        });
    </script>
</body>
</html>
