<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Master Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 60px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
            touch-action: none;
        }

        .studio-container {
            width: 1366px; height: 657px;
            max-width: 100%; max-height: 100%;
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 20px; border: 1px solid var(--border);
            position: relative;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); letter-spacing: 2px; font-size: 14px; text-shadow: 0 0 10px var(--amber-glow); }

        .studio-viewport {
            display: flex; flex: 1; 
            padding: 15px 0; overflow: hidden; position: relative;
        }

        /* --- ORIENTATION LOGIC --- */
        @media (orientation: landscape) {
            .studio-viewport { flex-direction: row; }
            .middle-stack { flex: 0 0 600px; width: 600px; height: 100%; }
            .drag-bar { width: 60px; margin: 0 -30px; cursor: col-resize; height: 100%; }
            .drag-bar::after { width: 2px; height: 60px; }
        }

        @media (orientation: portrait) {
            .studio-viewport { flex-direction: column; }
            .middle-stack { flex: 0 0 50%; width: 100%; height: 50%; }
            .drag-bar { height: 60px; margin: -30px 0; cursor: row-resize; width: 100%; }
            .drag-bar::after { width: 60px; height: 2px; }
        }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; 
            overflow: hidden; height: 100%; width: 100%;
        }

        .visual-pane { flex: 1 1 auto; background: #fff; z-index: 1; overflow: hidden; }

        .pane-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 12px; background: rgba(255, 255, 255, 0.03);
            color: var(--amber); border-bottom: 1px solid var(--border); 
            font-weight: bold; display: flex; justify-content: space-between;
        }

        .size-tag { font-family: monospace; opacity: 0.8; font-size: 9px; color: #fff; }

        .drag-bar { display: flex; justify-content: center; align-items: center; flex-shrink: 0; z-index: 100; touch-action: none; }
        .drag-bar::after { content: ''; background: var(--amber); box-shadow: 0 0 8px var(--amber-glow); transition: 0.1s; }
        .drag-bar.at-limit::after { background: #fff; transform: scale(1.4); box-shadow: 0 0 15px #fff; }

        #drag-shield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; }

        .code-area {
            flex: 1; padding: 15px; font-family: 'Courier New', monospace;
            font-size: 13px; color: #cbd5e1; overflow-y: auto;
            outline: none; line-height: 1.5; caret-color: var(--amber);
            white-space: pre-wrap; word-break: break-all;
        }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="drag-shield"></div>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane">
                    <div class="pane-label">
                        <span>Source Editor</span>
                        <span class="size-tag" id="src-size">0.00"</span>
                    </div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="color: #888; background: #f9f9f9;">
                    <span>Visual Output</span>
                    <span class="size-tag" id="vis-size" style="color: #666;">0.00"</span>
                </div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const shield = document.getElementById('drag-shield');
        const middleStack = document.getElementById('middleStack');
        const srcSize = document.getElementById('src-size');
        const visSize = document.getElementById('vis-size');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        
        let isDragging = false;
        let debounceTimer;
        const DPI = 96;

        function pxToIn(px) { return (px / DPI).toFixed(2); }

        function updateSizeLabels() {
            const editorRect = middleStack.getBoundingClientRect();
            const visualPane = document.querySelector('.visual-pane');
            const visualRect = visualPane.getBoundingClientRect();
            srcSize.innerText = `${pxToIn(editorRect.width)}"W x ${pxToIn(editorRect.height)}"H`;
            visSize.innerText = `${pxToIn(visualRect.width)}"W x ${pxToIn(visualRect.height)}"H`;
        }

        // --- PREVIEW ENGINE (RESTORED) ---
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const doc = preview.contentDocument || preview.contentWindow.document;
                const content = codeInput.innerText;
                const head = `<style>body{font-family:sans-serif;padding:15px;margin:0;word-wrap:break-word;background:#fff;}</style>`;
                doc.open();
                doc.write(head + content);
                doc.close();
            }, 300);
        }

        function onMove(e) {
            if (!isDragging) return;
            const isPortrait = window.innerHeight > window.innerWidth;
            const viewport = document.querySelector('.studio-viewport').getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            if (isPortrait) {
                let newH = clientY - viewport.top;
                const maxH = viewport.height - 150; 
                if (newH < 100) newH = 100;
                if (newH > maxH) newH = maxH;
                middleStack.style.height = `${newH}px`;
                middleStack.style.flex = `0 0 ${newH}px`;
                middleStack.style.width = "100%";
            } else {
                let newW = clientX - viewport.left;
                const maxW = viewport.width - 250;
                if (newW < 200) newW = 200;
                if (newW > maxW) newW = maxW;
                middleStack.style.width = `${newW}px`;
                middleStack.style.flex = `0 0 ${newW}px`;
                middleStack.style.height = "100%";
            }
            updateSizeLabels();
        }

        handle.addEventListener('mousedown', () => { isDragging = true; shield.style.display = 'block'; });
        handle.addEventListener('touchstart', (e) => { isDragging = true; shield.style.display = 'block'; if(e.cancelable) e.preventDefault(); }, {passive: false});

        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        
        document.addEventListener('mouseup', () => { isDragging = false; shield.style.display = 'none'; });
        document.addEventListener('touchend', () => { isDragging = false; shield.style.display = 'none'; });

        // --- INPUT LISTENERS ---
        codeInput.addEventListener('input', updatePreview);
        
        // Handle Paste specifically
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
            updatePreview(); // Immediate update on paste
        });

        window.addEventListener('resize', () => {
            updateSizeLabels();
        });

        window.onload = () => { updatePreview(); updateSizeLabels(); codeInput.focus(); };
    </script>
</body>
</html>
