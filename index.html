<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
            user-select: none;
        }

        /* --- TACTICAL SCROLLBARS --- */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { 
            background: var(--hud-blue); 
            border-radius: 10px; 
            box-shadow: 0 0 8px var(--hud-blue); 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--hud-red); 
            box-shadow: 0 0 12px var(--hud-red); 
        }

        #boot-loader {
            position: absolute; inset: 0;
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: var(--hud-blue);
            font-size: 10px; letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }

        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 92vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
        }

        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .nav-tools { display: flex; align-items: center; gap: 15px; }
        .hud-input-small { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--hud-blue); 
            font-size: 9px; padding: 2px 5px; width: 60px; outline: none;
        }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #333; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .search-container { padding: 5px 10px; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        #search-input { background: transparent; border: 1px solid var(--hud-blue); color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px 8px; outline: none; width: 100%; }
        #search-next { background: var(--hud-blue); border: none; color: white; font-size: 8px; cursor: pointer; padding: 4px 8px; display: none; }
        #match-count { color: var(--hud-blue); font-size: 9px; white-space: nowrap; opacity: 0.6; }
        #match-count.found { color: var(--hud-red); opacity: 1; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        #line-numbers {
            width: 45px; padding: 20px 8px; background: rgba(0,0,0,0.4);
            color: #333; font-size: 12px; text-align: right; 
            border-right: 1px solid var(--border); overflow: hidden; line-height: 1.5; pointer-events: none;
        }
        .code-area { 
            flex: 1; padding: 20px; color: #a1a1aa; outline: none; 
            font-size: 13px; white-space: pre; overflow: auto; 
            user-select: text; line-height: 1.5; 
        }
        
        mark { background: rgba(255, 23, 68, 0.5); color: #fff; }
        mark.active-match { outline: 2px solid white; background: var(--hud-red); }

        .drag-bar { background: rgba(255, 255, 255, 0.04); z-index: 100; display: flex; align-items: center; justify-content: center; width: 20px; cursor: col-resize; }

        iframe { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper" id="main-frame">
        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX_CORE // V16.5</span>
                <div class="nav-tools">
                    <span style="opacity: 0.5;">GOTO_LN:</span>
                    <input type="number" id="goto-input" class="hud-input-small" placeholder="000">
                    <span id="status-indicator">● LIVE_SYNC</span>
                </div>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="SEARCH_SOURCE (REGEX SAFE)..." spellcheck="false">
                        <button id="search-next">NEXT ></button>
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                
                <div class="drag-bar" id="drag-handle"></div>
                
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000; display: flex; justify-content: space-between; align-items: center; padding: 4px 10px;">
                        <span>RUNTIME</span>
                        <span id="lock-btn" style="cursor: pointer; display: flex; align-items: center;">
                            <svg id="lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path id="lock-path" d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            </svg>
                        </span>
                    </div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('code-input'),
              lineNumbers = document.getElementById('line-numbers'),
              preview = document.getElementById('preview-frame'),
              searchInput = document.getElementById('search-input'),
              searchNext = document.getElementById('search-next'),
              matchDisplay = document.getElementById('match-count'),
              lockBtn = document.getElementById('lock-btn'),
              lockPath = document.getElementById('lock-path'),
              status = document.getElementById('status-indicator');

        let isRuntimeLocked = false;
        let currentMatchIndex = -1;

        window.onload = () => {
            document.getElementById('load-bar').style.width = "100%";
            setTimeout(() => {
                updateLineNumbers();
                updatePreview();
                document.getElementById('boot-loader').remove();
                codeInput.focus();
            }, 600);
        };

        /* --- LINE NUMBERS (1-999) --- */
        function updateLineNumbers() {
            let nums = "";
            for(let i = 1; i <= 999; i++) nums += i + "<br>";
            lineNumbers.innerHTML = nums;
        }

        /* --- SEARCH ENGINE (Handles Special Characters) --- */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function runSearch() {
            const query = searchInput.value;
            const text = codeInput.innerText;

            if (!query) {
                codeInput.innerHTML = escapeHtml(text);
                matchDisplay.innerText = "0 MATCHES";
                searchNext.style.display = "none";
                return;
            }

            // Escape special chars like [ ] ( ) $ * + ? . 
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedQuery})`, 'gi');
            const matches = text.match(regex);

            if (matches) {
                matchDisplay.classList.add('found');
                searchNext.style.display = "block";
                codeInput.innerHTML = escapeHtml(text).replace(regex, '<mark>$1</mark>');
                jumpToMatch(0);
            } else {
                matchDisplay.classList.remove('found');
                matchDisplay.innerText = "0 MATCHES";
                searchNext.style.display = "none";
                codeInput.innerHTML = escapeHtml(text);
            }
        }

        function jumpToMatch(index) {
            const marks = codeInput.querySelectorAll('mark');
            if (marks.length === 0) return;

            // Clear previous active
            marks.forEach(m => m.classList.remove('active-match'));
            
            currentMatchIndex = (index + marks.length) % marks.length;
            const target = marks[currentMatchIndex];
            
            target.classList.add('active-match');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            matchDisplay.innerText = `${currentMatchIndex + 1} / ${marks.length} MATCHES`;
        }

        searchInput.oninput = runSearch;
        searchInput.onkeydown = (e) => { if(e.key === 'Enter') jumpToMatch(currentMatchIndex + 1); };
        searchNext.onclick = () => jumpToMatch(currentMatchIndex + 1);

        /* --- RUNTIME LOCK --- */
        lockBtn.onclick = () => {
            isRuntimeLocked = !isRuntimeLocked;
            lockPath.setAttribute("d", isRuntimeLocked ? "M7 11V7a5 5 0 0 1 10 0v4" : "M7 11V7a5 5 0 0 1 9.9-1");
            status.innerText = isRuntimeLocked ? "● SYNC_PAUSED" : "● LIVE_SYNC";
            status.style.color = isRuntimeLocked ? "var(--hud-red)" : "var(--hud-blue)";
            if(!isRuntimeLocked) updatePreview();
        };

        /* --- CORE LOGIC --- */
        function updatePreview() {
            const blob = new Blob([`<!DOCTYPE html><html><body style="padding:20px;font-family:sans-serif">${codeInput.innerText}</body></html>`], {type: 'text/html'});
            preview.src = URL.createObjectURL(blob);
        }

        codeInput.oninput = () => { if(!isRuntimeLocked) updatePreview(); };
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };

        // Reset search highlights on click to allow editing
        codeInput.onmousedown = () => {
            if (searchInput.value) {
                const raw = codeInput.innerText;
                codeInput.innerHTML = escapeHtml(raw);
                searchInput.value = "";
                matchDisplay.innerText = "0 MATCHES";
                searchNext.style.display = "none";
            }
        };
    </script>
</body>
</html>
