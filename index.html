<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --hud-green: #00ff88;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
            --boundary-color: rgba(0, 102, 255, 0.2);
            --font-main: 'SF Mono', 'Fira Code', monospace;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: var(--font-main);
            user-select: none;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { 
            background: var(--hud-blue); 
            border-radius: 10px; 
            box-shadow: 0 0 8px var(--hud-blue); 
        }
        ::-webkit-scrollbar-thumb:hover { 
            background: var(--hud-red); 
            box-shadow: 0 0 12px var(--hud-red); 
        }

        #boot-loader {
            position: absolute; inset: 0;
            background: var(--bg-dark);
            z-index: 500;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: var(--hud-blue);
            font-size: 10px; letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }

        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper {
             width: 100vw; height: 100vh;
            max-width: 100vw; max-height: 100vh;
            position: relative;
            background-color: var(--bg-dark);
            transition: border 0.2s;
        }

        .studio-container {
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .nav-tools { display: flex; align-items: center; gap: 10px; }
        
        .hud-input-small { 
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--hud-blue); 
            font-size: 9px; padding: 2px 5px; width: 60px; outline: none; transition: border 0.2s;
            -moz-appearance: textfield;
        }
        .hud-input-small::-webkit-outer-spin-button,
        .hud-input-small::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        #goto-btn {
            background: var(--hud-blue); border: none; color: white; 
            font-size: 9px; cursor: pointer; height: 15px; padding: 0px 8px; 
            font-family: inherit; transition: background 0.2s;
        }
        #goto-btn:hover { background: var(--hud-red); }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; border: 2px solid #ccc; }

        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); }

        .search-container { 
            padding: 5px 10px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--boundary-color); 
            margin: 5px;
            display: flex; 
            align-items: center; 
        }
        #search-input { background: transparent; border: none; color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px 8px; outline: none; width: 100%; }
        #match-count { color: var(--hud-blue); font-size: 9px; margin-left: 10px; white-space: nowrap; opacity: 0.6; transition: all 0.2s; }
        #match-count.found { color: var(--hud-red); text-shadow: 0 0 5px var(--hud-red); opacity: 1; }

        .editor-layout { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative; 
            border: 2px solid var(--boundary-color); 
            margin: 5px;
        }
        
        #line-numbers {
            width: 50px; 
            padding: 20px 0; 
            background: rgba(0,0,0,0.4);
            color: #333; 
            font-size: 13px; 
            text-align: center; 
            border-right: 2px solid var(--boundary-color); 
            overflow: hidden; 
            line-height: 1.5; 
            pointer-events: none;
            font-family: var(--font-main);
        }

        .ln-mark { color: var(--hud-red) !important; text-shadow: 0 0 5px var(--hud-red); font-weight: bold; background: rgba(255, 23, 68, 0.15); }

        .code-area { 
            flex: 1; 
            padding: 20px; 
            color: #a1a1aa; 
            outline: none; 
            font-size: 13px; 
            white-space: pre; 
            overflow: auto; 
            user-select: text; 
            line-height: 1.5; 
            position: relative;
            font-family: var(--font-main);
            border-left: 1px solid var(--border);
        }
        
        mark { background: rgba(255, 23, 68, 0.3); color: #fff; border-radius: 1px; transition: background 0.2s; }
        mark.current-match { background: rgba(255, 23, 68, 0.8); box-shadow: 0 0 12px var(--hud-red); }

        .drag-bar { 
            background: rgba(0, 102, 255, 0.1); 
            z-index: 100; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid var(--border);
        }

        .drag-bar::before { 
            content: ""; 
            width: 2px; 
            height: 30%; 
            background: var(--hud-blue); 
            border-radius: 2px; 
            box-shadow: 0 0 8px var(--hud-blue);
            transition: all 0.3s ease;
        }

        #viewport[style*="flex-direction: column"] #drag-handle::before {
            width: 30%; height: 2px; 
        }

        iframe { width: 100%; height: 100%; border: none; }
        .shield { pointer-events: none !important; }

        #chat-trigger { 
            position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; 
            background: var(--bg-dark); border: 2px solid var(--hud-blue); border-radius: 50%; 
            color: var(--hud-blue); display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 600; font-size: 20px; box-shadow: 0 0 10px var(--hud-blue);
        }
        #chat-dialog { 
            position: fixed; inset: 0; background: rgba(8, 9, 11, 0.98); 
            z-index: 900; display: none; flex-direction: column; padding: 30px; 
        }
        #chat-body { 
            flex: 1; margin-top: 20px; border: 1px solid var(--boundary-color); 
            padding: 20px; color: #ccc; font-size: 13px; 
            overflow-y: auto; line-height: 1.6;
        }
        
        #chat-body code { color: var(--hud-green); font-family: var(--font-main); }
        #chat-body pre { position: relative; background: #000 !important; border: 1px solid var(--border); padding: 15px; margin: 15px 0; overflow-x: auto; }
        
        .copy-btn { 
            position: absolute; top: 5px; right: 5px; background: var(--hud-blue); 
            color: #fff; border: none; font-size: 9px; padding: 3px 6px; 
            cursor: pointer; border-radius: 2px; opacity: 0.6; 
        }
        .copy-btn:hover { opacity: 1; background: var(--hud-red); }

        .chat-input-wrapper { 
            margin-top: 15px; display: flex; gap: 10px; 
            border: 1px solid var(--boundary-color); padding: 10px; 
        }
        #terminal-input { flex: 1; background: transparent; border: none; outline: none; color: var(--hud-red); font-family: inherit; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        @media screen and (max-width: 768px) {
            .hud-input-small { width: 80px; height: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div id="load-status">NEUROSENTIX</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper" id="main-frame">
        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX STUDIO</span>
                <div class="nav-tools">
                    <input type="number" id="goto-input" class="hud-input-small" placeholder="000">
                    <button id="goto-btn">GO</button>
                    <span id="status-indicator">● OFFLINE</span>
                </div>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">SOURCE_EDITOR</div>
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="search" spellcheck="false" autocomplete="off">
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000;">RUNTIME</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <div id="chat-trigger">◈</div>
    <div id="chat-dialog">
        <div style="display:flex; justify-content:space-between; color:var(--hud-red); font-size:11px; letter-spacing:3px; border-bottom:1px solid var(--boundary-color); padding-bottom:10px;">
            <span>TERMINAL_LINK</span> <span id="close-dialog" style="cursor:pointer;">[ ESC_X ]</span>
        </div>
        <div id="chat-body">> [SYSTEM]: Live Context Ready.</div>
        <div class="chat-input-wrapper">
            <span style="color:var(--hud-red)">USR:</span>
            <input type="text" id="terminal-input" placeholder="Ask about your code..." autocomplete="off">
        </div>
    </div>

   <script src="./config.js"></script>

    <script>
        const viewport = document.getElementById('viewport'),
              handle = document.getElementById('drag-handle'),
              editor = document.getElementById('editorPane'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              searchInput = document.getElementById('search-input'),
              matchDisplay = document.getElementById('match-count'),
              lineNumbers = document.getElementById('line-numbers'),
              gotoInput = document.getElementById('goto-input'),
              gotoBtn = document.getElementById('goto-btn'),
              loadBar = document.getElementById('load-bar'),
              loader = document.getElementById('boot-loader'),
              statusInd = document.getElementById('status-indicator'),
              chatTrigger = document.getElementById('chat-trigger'),
              chatDialog = document.getElementById('chat-dialog'),
              closeDialog = document.getElementById('close-dialog'),
              terminalInput = document.getElementById('terminal-input'),
              chatBody = document.getElementById('chat-body');

        let isDragging = false, currentMatchIndex = -1, matchElements = [], syncTimer; 

        window.onload = () => {
            loadBar.style.width = "100%";
            const forceBoot = setTimeout(finishBoot, 2500);

            function finishBoot() {
                clearTimeout(forceBoot);
                handleOrientation();
                updatePreview();
                updateLineNumbers();
                
                if (typeof GROQ_CONFIG !== 'undefined') {
                    statusInd.innerText = "● LIVE_SYNC";
                    statusInd.style.color = "var(--hud-green)";
                } else {
                    statusInd.innerText = "● ERR_CONFIG_MISSING";
                    statusInd.style.color = "var(--hud-red)";
                    statusInd.style.animation = "pulse 1.5s infinite";
                }

                loader.style.opacity = "0";
                setTimeout(() => { if(loader) loader.remove(); }, 500);
                codeInput.focus();
            }
            setTimeout(finishBoot, 800);
        };

        function handleOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            viewport.style.flexDirection = isPortrait ? 'column' : 'row';
            handle.style.width = isPortrait ? '100%' : '20px';
            handle.style.height = isPortrait ? '20px' : '100%';
            handle.style.cursor = isPortrait ? 'row-resize' : 'col-resize';
            editor.style.flex = isPortrait ? '0 0 40%' : '0 0 50%';
        }

        handle.onmousedown = () => { isDragging = true; preview.classList.add('shield'); };
        document.onmouseup = () => { isDragging = false; preview.classList.remove('shield'); };
        document.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = viewport.getBoundingClientRect();
            if (window.innerHeight > window.innerWidth) {
                let y = e.clientY - rect.top;
                if (y > 40 && y < rect.height - 40) editor.style.flex = `0 0 ${y}px`;
            } else {
                let x = e.clientX - rect.left;
                if (x > 100 && x < rect.width - 100) editor.style.flex = `0 0 ${x}px`;
            }
        };

        function updateLineNumbers() {
            let nums = "";
            for(let i = 1; i <= 200; i++) {
                const existingMark = lineNumbers.children[i-1]?.classList.contains('ln-mark') ? 'ln-mark' : '';
                nums += `<div class="${existingMark}" style="height:1.5em; display:flex; align-items:center; justify-content:center;">${i}</div>`;
            }
            lineNumbers.innerHTML = nums;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToMatch(index) {
            if (matchElements.length === 0) return;
            matchElements.forEach(el => el.classList.remove('current-match'));
            currentMatchIndex = (index + matchElements.length) % matchElements.length;
            const target = matchElements[currentMatchIndex];
            target.classList.add('current-match');
            const parentRect = codeInput.getBoundingClientRect();
            const matchRect = target.getBoundingClientRect();
            const relativeTop = (matchRect.top - parentRect.top) + codeInput.scrollTop;
            codeInput.scrollTo({ top: relativeTop - (codeInput.offsetHeight / 2), behavior: 'smooth' });
            matchDisplay.innerText = `${currentMatchIndex + 1}/${matchElements.length} MATCHES`;
        }

        searchInput.oninput = () => {
            const query = searchInput.value;
            const text = codeInput.innerText;
            if (!query.trim()) {
                codeInput.textContent = text;
                matchDisplay.innerText = "0 MATCHES";
                matchElements = []; updateLineNumbers(); return;
            }
            const regex = new RegExp(`(${escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            const escapedText = escapeHtml(text);
            if (escapedText.match(regex)) {
                codeInput.innerHTML = escapedText.replace(regex, '<mark>$1</mark>');
                matchElements = Array.from(codeInput.querySelectorAll('mark'));
                matchDisplay.classList.add('found');
                updateLineNumbers(); scrollToMatch(0);
            } else {
                matchDisplay.classList.remove('found');
                codeInput.innerText = text; matchElements = []; updateLineNumbers();
            }
        };

        function executeGoto() {
            const lineNum = parseInt(gotoInput.value);
            if (lineNum > 0) {
                codeInput.scrollTop = (lineNum - 1) * (1.5 * 13);
                const allNumbers = lineNumbers.querySelectorAll('div');
                allNumbers.forEach(el => el.classList.remove('ln-mark'));
                if (allNumbers[lineNum - 1]) allNumbers[lineNum - 1].classList.add('ln-mark');
                gotoInput.blur();
            }
        }

        gotoBtn.onclick = executeGoto;
        gotoInput.onkeydown = (e) => { if (e.key === 'Enter') executeGoto(); };

        function updatePreview() {
            const code = codeInput.innerText || "";
            const errorReporter = `
                <script>
                    window.onerror = function(msg, url, line, col, error) {
                        window.parent.postMessage({
                            type: 'RUNTIME_ERR',
                            msg: msg,
                            line: line
                        }, '*');
                        return false;
                    };
                <\/script>
            `;

            const blob = new Blob([`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    ${errorReporter}
                    <style>body{padding:2rem;font-family:sans-serif;background:#fff;}</style>
                </head>
                <body>${code}</body>
                </html>
            `], { type: 'text/html' });

            if (preview.src) URL.revokeObjectURL(preview.src);
            preview.src = URL.createObjectURL(blob);
        }

        codeInput.oninput = () => { 
            clearTimeout(syncTimer); updateLineNumbers(); 
            syncTimer = setTimeout(() => { updatePreview(); }, 500);
        };

        chatTrigger.onclick = () => { chatDialog.style.display = 'flex'; terminalInput.focus(); };
        closeDialog.onclick = () => { chatDialog.style.display = 'none'; };

        terminalInput.onkeydown = async (e) => {
            if (e.key === 'Enter' && terminalInput.value.trim() !== "") {
                const userMsg = terminalInput.value;
                const currentCode = codeInput.innerText.replace(/\u00a0/g, ' ').trim(); 
                
                chatBody.innerHTML += `<div><span style="color:var(--hud-red)">USR:</span> ${userMsg}</div>`;
                terminalInput.value = "";
                const loadingId = "msg-" + Date.now();
                chatBody.innerHTML += `<div id="${loadingId}" style="opacity:0.5; margin-bottom:15px;">SYS: ANALYZING_BUFFER...</div>`;
                chatBody.scrollTop = chatBody.scrollHeight;

                if (typeof GROQ_CONFIG === 'undefined') {
                    document.getElementById(loadingId).innerText = "SYS: ERR_CONFIG_MISSING";
                    return;
                }

                statusInd.innerText = "● SYNCING_CONTEXT...";
                statusInd.style.color = "var(--hud-blue)";

                try {
                    // CORS PROXY INTEGRATION
                    const proxyUrl = "https://cors-anywhere.herokuapp.com/";
                    const apiUrl = "https://api.groq.com/openai/v1/chat/completions";

                    const response = await fetch(proxyUrl + apiUrl, {
                        method: "POST",
                        headers: { 
                            "Authorization": `Bearer ${GROQ_CONFIG.API_KEY}`, 
                            "Content-Type": "application/json",
                            "X-Requested-With": "XMLHttpRequest"
                        },
                        body: JSON.stringify({ 
                            model: GROQ_CONFIG.MODEL, 
                            messages: [
                                { 
                                    role: "system", 
                                    content: `CORE_LOGIC: You are the Neurosentix Studio Safety-First AI. ENVIRONMENT: Live HTML/JS Editor. CONTEXT_BUFFER: \n---\n${currentCode}\n---\n PROTOCOL: 1. RISK_CHECK 2. ERROR_PREVENTION 3. TASK: Surgical Markdown corrections.` 
                                },
                                { role: "user", content: userMsg }
                            ]
                        })
                    });
                    
                    const data = await response.json();
                    const aiContent = data.choices[0].message.content;
                    
                    const targetDiv = document.getElementById(loadingId);
                    targetDiv.style.opacity = "1";
                    targetDiv.innerHTML = `<span style="color:var(--hud-blue)">SYS:</span><br>${marked.parse(aiContent)}`;
                    
                    targetDiv.querySelectorAll('pre').forEach(block => {
                        const container = document.createElement('div');
                        container.style.position = 'absolute';
                        container.style.top = '5px';
                        container.style.right = '5px';
                        container.style.display = 'flex';
                        container.style.gap = '5px';

                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.style.position = 'static';
                        copyBtn.innerText = 'COPY';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(block.innerText.replace('COPYINSERT', ''));
                        };

                        const insBtn = document.createElement('button');
                        insBtn.className = 'copy-btn';
                        insBtn.style.position = 'static';
                        insBtn.style.background = 'var(--hud-red)';
                        insBtn.innerText = 'INSERT';
                        insBtn.onclick = () => {
                            const cleanCode = block.innerText.replace('COPYINSERT', '');
                            codeInput.focus();
                            document.execCommand('insertText', false, cleanCode);
                            updatePreview();
                            updateLineNumbers();
                        };

                        container.appendChild(insBtn);
                        container.appendChild(copyBtn);
                        block.appendChild(container);
                    });
                    
                    Prism.highlightAllUnder(targetDiv);
                    statusInd.innerText = "● LIVE_SYNC";
                    statusInd.style.color = "var(--hud-green)";
                    statusInd.style.animation = "none";
                    
                } catch (err) {
                    document.getElementById(loadingId).innerText = "SYS: ERROR_CONNECTION_FAILED";
                    statusInd.style.color = "var(--hud-red)";
                }
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        };

        window.addEventListener('message', (e) => {
            if (e.data.type === 'RUNTIME_ERR') {
                statusInd.innerHTML = `● ERR: ${e.data.msg} (LN: ${e.data.line}) <span id="clear-err" style="margin-left:8px; cursor:pointer; text-decoration:underline; font-weight:bold;">[FIXED]</span>`;
                statusInd.style.color = "var(--hud-red)";
                statusInd.style.animation = "pulse 0.5s infinite";
                
                const lineNum = e.data.line;
                const allNumbers = lineNumbers.querySelectorAll('div');
                allNumbers.forEach(el => el.classList.remove('ln-mark'));
                if (allNumbers[lineNum - 1]) allNumbers[lineNum - 1].classList.add('ln-mark');

                document.getElementById('clear-err').onclick = (event) => {
                    event.stopPropagation();
                    statusInd.innerText = "● LIVE_SYNC";
                    statusInd.style.color = "var(--hud-green)";
                    statusInd.style.animation = "none";
                    allNumbers.forEach(el => el.classList.remove('ln-mark'));
                };
            }
        });

        window.onresize = handleOrientation;
        codeInput.onscroll = () => { lineNumbers.scrollTop = codeInput.scrollTop; };
    </script>
</body>
</html>
