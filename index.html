<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix AI Chatbot</title>
    <style>
        /* CSS stays the same as before */
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 95%; max-width: 600px; height: 90vh; background: #1e293b; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-display { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 85%; word-wrap: break-word; }
        .user-message { align-self: flex-end; background-color: #3b82f6; }
        .bot-message { align-self: flex-start; background-color: #475569; }
        #input-area { display: flex; padding: 10px; background: #1e293b; border-top: 1px solid #475569; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; } /* 16px prevents zoom on iOS */
        button { padding: 10px 15px; background: #3b82f6; border: none; color: white; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-display"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Message Neurosentix..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        // Config embedded directly to bypass Module restrictions on mobile
        const GROQ_CONFIG = {
            API_KEY: "YOUR_GROQ_API_KEY_HERE",
            MODEL: "llama3-8b-8192"
        };

        const chatDisplay = document.getElementById('chat-display');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_CONFIG.API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: message }],
                        model: GROQ_CONFIG.MODEL
                    })
                });

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                appendMessage('bot', aiMessage);
            } catch (error) {
                appendMessage('bot', "Connection Error. Check API key and internet.");
            }
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            msgDiv.textContent = text;
            chatDisplay.appendChild(msgDiv);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        // Use 'click' for the button and 'touchend' for better mobile responsiveness
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
