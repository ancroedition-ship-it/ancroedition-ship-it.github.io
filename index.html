<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Fullscreen Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 64px;
            --fixed-width: 1366px;
            --fixed-height: 657px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: Arial, Helvetica, sans-serif;
        }

        /* HARD-LOCKED CONTAINER */
        .studio-container {
            width: var(--fixed-width); 
            height: var(--fixed-height);
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 32px; border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,0,0,1);
            position: relative;
            transition: width 0.3s ease, height 0.3s ease;
        }

        /* FULLSCREEN STATE */
        .studio-container:fullscreen {
            width: 100vw; height: 100vh;
            padding: 0 40px; border: none;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            justify-content: space-between; /* Pushes button to the right */
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); letter-spacing: 2px; }

        /* FULLSCREEN BUTTON */
        .fs-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--amber); padding: 8px 12px; cursor: pointer;
            font-size: 10px; font-weight: bold; letter-spacing: 1px;
            border-radius: 4px; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .fs-btn:hover {
            background: var(--amber-glow); border-color: var(--amber);
            box-shadow: 0 0 10px var(--amber-glow);
        }

        .studio-viewport {
            display: flex; flex-direction: row !important; flex: 1; 
            padding: 20px 0; height: calc(100% - var(--header-h)); 
            overflow: hidden; position: relative;
        }

        .middle-stack {
            display: flex; flex-direction: column;
            flex: 0 0 600px; width: 600px; height: 100%;
        }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; 
            overflow: hidden; height: 100%;
        }

        .visual-pane { flex: 1; background: #ffffff; min-width: 300px; }

        .pane-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            padding: 10px 16px; background: rgba(255, 255, 255, 0.02);
            color: var(--amber); border-bottom: 1px solid var(--border); font-weight: bold;
        }

        .drag-bar {
            width: 60px; margin: 0 -28px; cursor: col-resize; 
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; z-index: 100; touch-action: none;
        }

        .drag-bar::after {
            content: ''; width: 2px; height: 60px; 
            background: var(--amber); box-shadow: 0 0 8px var(--amber-glow);
        }

        #drag-shield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999; display: none; cursor: col-resize;
        }

        .code-area {
            flex: 1; padding: 20px; font-family: Arial, sans-serif;
            font-size: 14px; color: #cbd5e1; overflow-y: auto;
            overflow-x: hidden; white-space: pre-wrap; word-break: break-all;
            outline: none; line-height: 1.5; caret-color: var(--amber);
        }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="drag-shield"></div>

    <div class="studio-container" id="studioMain">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
            <button class="fs-btn" onclick="toggleFS()">[ FULLSCREEN ]</button>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f8f9fa; color: #999;">Visual Output</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const studio = document.getElementById('studioMain');
        const handle = document.getElementById('drag-handle');
        const shield = document.getElementById('drag-shield');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        
        let isDragging = false;
        let debounceTimer;

        // --- FULLSCREEN LOGIC ---
        function toggleFS() {
            if (!document.fullscreenElement) {
                studio.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- DRAG ENGINE ---
        function startDrag(e) {
            isDragging = true;
            shield.style.display = 'block';
            document.body.style.userSelect = 'none';
        }

        function onMove(e) {
            if (!isDragging) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = studio.getBoundingClientRect();
            
            let newX = clientX - rect.left - 32;

            // Boundaries: Min 200px Left / Min 300px Right
            const minLeft = 200;
            const maxLeft = rect.width - 64 - 300; 

            if (newX < minLeft) newX = minLeft;
            if (newX > maxLeft) newX = maxLeft;

            middleStack.style.flex = `0 0 ${newX}px`;
            middleStack.style.width = `${newX}px`;
        }

        function endDrag() {
            isDragging = false;
            shield.style.display = 'none';
            document.body.style.userSelect = 'auto';
        }

        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchend', endDrag);

        // --- PREVIEW ENGINE ---
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const content = codeInput.innerText;
                const doc = preview.contentDocument || preview.contentWindow.document;
                const head = `<style>html,body{margin:0;padding:20px;width:100%;min-height:100vh;word-wrap:break-word;overflow-x:hidden;font-family:Arial,sans-serif;background:#fff;color:#000;}*{box-sizing:border-box;}</style>`;
                doc.open();
                doc.write(head + content);
                doc.close();
            }, 400);
        }

        codeInput.addEventListener('input', updatePreview);
        window.onload = () => { updatePreview(); codeInput.focus(); };

        // Clean Paste
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });
    </script>
</body>
</html>
