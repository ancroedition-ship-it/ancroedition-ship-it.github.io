<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurosentix Core Studio | Console Integrated</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #64748b;
            --header-h: 64px;
            --fixed-width: 1366px;
            --fixed-height: 657px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
        }

        .studio-container {
            width: var(--fixed-width); height: var(--fixed-height);
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 32px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); }

        .studio-viewport {
            display: flex; flex: 1; padding: 20px 0;
            height: calc(var(--fixed-height) - var(--header-h)); 
            overflow: hidden;
        }

        .middle-stack {
            display: flex; flex-direction: column;
            flex: 0 0 550px; gap: 12px; height: 100%;
        }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;
        }

        .editor-pane { flex: 2; }
        
        /* Console Log Styling */
        .console-pane { flex: 1; background: #000; border: 1px solid #1a1a1a; }
        
        .visual-pane { flex: 1; background: #ffffff; }

        .pane-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 2px;
            padding: 10px 16px; background: rgba(255, 255, 255, 0.02);
            color: var(--amber); border-bottom: 1px solid var(--border);
        }

        .drag-bar {
            width: 20px; cursor: col-resize; display: flex; justify-content: center; align-items: center;
        }

        .drag-bar::after {
            content: ''; width: 2px; height: 35px; background: var(--border); transition: 0.3s;
        }

        .drag-bar:hover::after { background: var(--amber); height: 50px; box-shadow: 0 0 12px var(--amber); }

        .code-area {
            flex: 1; padding: 20px; font-family: 'Fira Code', monospace;
            font-size: 13px; color: #cbd5e1; overflow-y: auto;
            white-space: pre; outline: none; line-height: 1.6;
        }

        /* Terminal Font for Console */
        #console-output {
            flex: 1; padding: 12px 16px; font-family: 'Fira Code', monospace;
            font-size: 11px; color: #10b981; overflow-y: auto; line-height: 1.4;
        }

        .output-frame { width: 100%; height: 100%; border: none; }

        .view-toggle {
            background: rgba(255, 255, 255, 0.04); padding: 4px; border-radius: 8px; display: flex; border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-dim);
            padding: 6px 18px; border-radius: 5px; cursor: pointer; font-size: 11px;
        }

        .toggle-btn.active { background: var(--amber); color: #000; }
    </style>
</head>
<body>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
            <nav class="view-toggle">
                <button class="toggle-btn active">Source</button>
                <button class="toggle-btn">Visual</button>
            </nav>
            <div style="font-size: 10px; color: var(--text-dim);">CORE v1.3 | CONSOLE MODE</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input">
<h1 id="title">Neurosentix Console</h1>
<script>
  console.log("System initialized...");
  document.getElementById('title').style.color = '#ffbf00';
</script>
                    </div>
                </section>

                <aside class="pane console-pane">
                    <div class="pane-label">Console Log</div>
                    <div id="console-output">> Ready_</div>
                </aside>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f8f9fa; color: #999;">Live Preview</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        const consoleOut = document.getElementById('console-output');

        let isResizing = false;

        // --- PASTE INTERCEPTOR (Fixed Boundaries Fix) ---
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        // --- RESIZING LOGIC ---
        handle.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mouseup', () => isResizing = false);

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerRect = document.querySelector('.studio-container').getBoundingClientRect();
            let newWidth = e.clientX - containerRect.left - 32;
            if (newWidth > 350 && newWidth < 950) {
                middleStack.style.flex = `0 0 ${newWidth}px`;
            }
        });

        // --- LIVE PREVIEW & CONSOLE HOOK ---
        function updatePreview() {
            const content = codeInput.innerText;
            const doc = preview.contentDocument || preview.contentWindow.document;
            
            // Inject a script to pipe iframe console to our UI
            const consoleHook = `
                <script>
                    const originalLog = console.log;
                    console.log = function(...args) {
                        window.parent.postMessage({type: 'log', data: args.join(' ')}, '*');
                        originalLog.apply(console, args);
                    };
                    window.onerror = function(msg) {
                        window.parent.postMessage({type: 'error', data: msg}, '*');
                    };
                <\/script>
            `;

            doc.open();
            doc.write(consoleHook + content);
            doc.close();
        }

        // Listen for messages from the iframe
        window.addEventListener('message', (event) => {
            if (event.data.type === 'log') {
                consoleOut.innerHTML += `<div><span style="color: #64748b">>></span> ${event.data.data}</div>`;
            } else if (event.data.type === 'error') {
                consoleOut.innerHTML += `<div style="color: #ef4444">!! ${event.data.data}</div>`;
            }
            consoleOut.scrollTop = consoleOut.scrollHeight;
        });

        codeInput.addEventListener('input', updatePreview);
        window.onload = updatePreview;
    </script>
</body>
</html>
