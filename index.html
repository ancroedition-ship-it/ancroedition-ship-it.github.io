<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Kiosk Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 64px;
            --fixed-width: 1366px;
            --fixed-height: 657px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none; /* Block pinch-zoom */
        }

        /* Fixed Studio Frame */
        .studio-container {
            width: var(--fixed-width); height: var(--fixed-height);
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 32px; border: 1px solid var(--border);
            box-shadow: 0 0 100px rgba(0,0,0,1);
            position: relative;
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); letter-spacing: 2px; }

        .exit-btn {
            font-size: 10px; color: var(--border); cursor: pointer;
            padding: 5px 10px; border: 1px solid var(--border);
            border-radius: 4px; transition: 0.3s;
        }
        .exit-btn:hover { color: #ff4444; border-color: #ff4444; }

        .studio-viewport {
            display: flex; flex-direction: row !important;
            flex: 1; padding: 20px 0; overflow: hidden;
        }

        .middle-stack { display: flex; flex-direction: column; flex: 0 0 600px; height: 100%; }

        .pane {
            background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 10px; display: flex; flex-direction: column; 
            overflow: hidden; height: 100%;
        }

        .visual-pane { flex: 1; background: #ffffff; margin-left: 0; }

        .pane-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            padding: 10px 16px; background: rgba(255, 255, 255, 0.02);
            color: var(--amber); border-bottom: 1px solid var(--border); font-weight: bold;
        }

        /* Stealth Scrollbar */
        .code-area::-webkit-scrollbar { width: 4px; }
        .code-area::-webkit-scrollbar-track { background: transparent; }
        .code-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .code-area:hover::-webkit-scrollbar-thumb { background: var(--amber); }

        .code-area {
            flex: 1; padding: 20px; font-family: Arial, sans-serif;
            font-size: 14px; color: #cbd5e1; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all; outline: none; line-height: 1.5;
        }

        .drag-bar { width: 20px; cursor: col-resize; display: flex; justify-content: center; align-items: center; }
        .drag-bar::after { content: ''; width: 2px; height: 35px; background: var(--border); transition: 0.3s; }
        .drag-bar:hover::after { background: var(--amber); height: 50px; box-shadow: 0 0 12px var(--amber); }

        .output-frame { width: 100%; height: 100%; border: none; }

        /* Fullscreen Overlay */
        #launcher {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }
        .launch-box {
            color: var(--amber); font-weight: 900; letter-spacing: 5px;
            border: 1px solid var(--amber); padding: 20px 40px;
            text-shadow: 0 0 10px var(--amber-glow);
        }
    </style>
</head>
<body>

    <div id="launcher" onclick="launchStudio()">
        <div class="launch-box">INITIALIZE NEUROSENTIX</div>
    </div>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
            <div class="exit-btn" onclick="exitStudio()">ESC / EXIT</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f8f9fa; color: #999;">Visual Output</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const middleStack = document.getElementById('middleStack');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        let isResizing = false;
        let debounceTimer;

        // --- Fullscreen Logic ---
        function launchStudio() {
            const element = document.documentElement;
            if (element.requestFullscreen) { element.requestFullscreen(); }
            else if (element.webkitRequestFullscreen) { element.webkitRequestFullscreen(); }
            document.getElementById('launcher').style.display = 'none';
        }

        function exitStudio() {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            document.getElementById('launcher').style.display = 'flex';
        }

        // --- Block Zoom ---
        window.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (['=', '-', '0', '+'].includes(e.key))) e.preventDefault();
        });

        // --- Dragging ---
        handle.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            preview.style.pointerEvents = 'none';
        });
        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            preview.style.pointerEvents = 'all';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerRect = document.querySelector('.studio-container').getBoundingClientRect();
            let newWidth = e.clientX - containerRect.left - 32;
            if (newWidth > 200 && newWidth < 1100) { middleStack.style.flex = `0 0 ${newWidth}px`; }
        });

        // --- Sync Scroll ---
        codeInput.addEventListener('scroll', () => {
            const editorScrollTop = codeInput.scrollTop;
            const editorScrollHeight = codeInput.scrollHeight - codeInput.clientHeight;
            const scrollPercentage = editorScrollTop / (editorScrollHeight || 1);
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            const previewScrollHeight = previewDoc.documentElement.scrollHeight - preview.clientHeight;
            preview.contentWindow.scrollTo(0, scrollPercentage * previewScrollHeight);
        });

        // --- Preview Engine ---
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const content = codeInput.innerText;
                const doc = preview.contentDocument || preview.contentWindow.document;
                const shield = `<style>html,body{margin:0;padding:20px;width:100%;min-height:100vh;word-wrap:break-word;overflow-wrap:break-word;font-family:Arial,sans-serif;background:#fff;}*{box-sizing:border-box;}</style>`;
                doc.open();
                doc.write(shield + content);
                doc.close();
            }, 400);
        }

        // Paste Clean
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        codeInput.addEventListener('input', updatePreview);
        window.onload = updatePreview;
    </script>
</body>
</html>
