<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | 10px Precision Studio</title>
    
    <style>
        :root {
            --bg-dark: #070708;
            --panel-bg: #111113;
            --amber: #ffbf00;
            --amber-glow: rgba(255, 191, 0, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --header-h: 64px;
            --fixed-width: 1366px;
            --fixed-height: 657px;
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: Arial, Helvetica, sans-serif;
            touch-action: none;
        }

        .studio-container {
            width: var(--fixed-width); 
            height: var(--fixed-height);
            background-color: var(--bg-dark);
            display: flex; flex-direction: column;
            padding: 0 32px; border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        .studio-header {
            height: var(--header-h);
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo { font-weight: 900; color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); letter-spacing: 2px; }

        .studio-viewport {
            display: flex; 
            flex-direction: row !important; 
            flex: 1; 
            padding: 20px 0;
            height: calc(var(--fixed-height) - var(--header-h)); 
            overflow: hidden;
        }

        .middle-stack {
            display: flex; 
            flex-direction: column;
            flex: 0 0 600px; /* Starting Width */
            width: 600px;
            height: 100%;
        }

        .pane {
            background: var(--panel-bg); 
            border: 1px solid var(--border);
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            height: 100%;
        }

        .visual-pane { flex: 1; background: #ffffff; min-width: 100px; }

        .pane-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
            padding: 10px 16px; background: rgba(255, 255, 255, 0.02);
            color: var(--amber); border-bottom: 1px solid var(--border);
            font-weight: bold;
        }

        /* --- 10px HITBOX DRAG BAR --- */
        .drag-bar {
            width: 10px; /* Precise 10px Hitbox */
            cursor: col-resize; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .drag-bar::after {
            content: ''; width: 2px; height: 50px; 
            background: var(--amber); 
            box-shadow: 0 0 8px var(--amber-glow);
            transition: transform 0.2s;
        }

        .drag-bar:active::after { transform: scaleX(2.5); }

        .code-area {
            flex: 1; padding: 20px; font-family: Arial, sans-serif;
            font-size: 14px; color: #cbd5e1; overflow-y: auto;
            overflow-x: hidden; white-space: pre-wrap; word-break: break-all;
            outline: none; line-height: 1.5;
        }

        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div class="studio-container">
        <header class="studio-header">
            <div class="logo">NEUROSENTIX</div>
        </header>

        <main class="studio-viewport">
            <div class="middle-stack" id="middleStack">
                <section class="pane editor-pane">
                    <div class="pane-label">Source Editor</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </section>
            </div>

            <div class="drag-bar" id="drag-handle"></div>

            <section class="pane visual-pane">
                <div class="pane-label" style="background: #f8f9fa; color: #999;">Visual Output</div>
                <iframe class="output-frame" id="preview-frame"></iframe>
            </section>
        </main>
    </div>

    <script>
        const handle = document.getElementById('drag-handle');
        const middleStack = document.getElementById('middleStack');
        const preview = document.getElementById('preview-frame');
        const codeInput = document.getElementById('code-input');
        
        let isDragging = false;
        let debounceTimer;

        // --- THE "HIGH-GRIP" ENGINE ---
        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            preview.style.pointerEvents = 'none'; // Lock iframe
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const containerRect = document.querySelector('.studio-container').getBoundingClientRect();
            
            // X-Pos relative to container start (minus 32px padding)
            let newX = e.clientX - containerRect.left - 32;

            // Boundaries: Min 150px / Max 1150px
            if (newX > 150 && newX < 1150) {
                middleStack.style.flex = `0 0 ${newX}px`;
                middleStack.style.width = `${newX}px`;
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                preview.style.pointerEvents = 'all';
                document.body.style.cursor = 'default';
                document.body.style.userSelect = 'auto';
            }
        });

        // --- PREVIEW & SYNC ---
        function updatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const content = codeInput.innerText;
                const doc = preview.contentDocument || preview.contentWindow.document;
                const shield = `<style>html,body{margin:0;padding:20px;width:100%;min-height:100vh;word-wrap:break-word;overflow-x:hidden;font-family:Arial,sans-serif;background:#fff;color:#000;}*{box-sizing:border-box;}</style>`;
                doc.open();
                doc.write(shield + content);
                doc.close();
            }, 400);
        }

        codeInput.addEventListener('input', updatePreview);
        window.onload = () => { updatePreview(); codeInput.focus(); };

        // Clean Paste
        codeInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });
    </script>
</body>
</html>
