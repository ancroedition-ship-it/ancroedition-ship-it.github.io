<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | RGB Studio V6.8 (SVG Optimized)</title>
    
    <style>
        :root {
            --bg-dark: #000;
            --panel-bg: #0a0a0b;
            --rgb-red: #ff0000;
            --rgb-green: #00ff00;
            --rgb-blue: #0066ff;
            --red-glow: rgba(255, 0, 0, 0.5);
            --blue-glow: rgba(0, 102, 255, 0.5);
            --border: rgba(255, 255, 255, 0.05);
            --header-h: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Inter', sans-serif;
            touch-action: none;
        }

        /* --- 1. BOOT LOADER --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-hidden { opacity: 0; visibility: hidden; }
        .buffer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .buffer-grid { display: flex; align-items: center; gap: 12px; -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(255,255,255,0.05)); }
        .loader-bar { width: 6px; height: 35px; background: rgba(255, 255, 255, 0.03); border-radius: 20px; position: relative; overflow: hidden; animation: barGrow 1.2s ease-in-out infinite; }
        .loader-bar::after { content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, var(--bar-color), transparent); animation: segmentSlide 0.8s ease-in-out infinite; filter: drop-shadow(0 0 10px var(--bar-color)); }
        @keyframes barGrow { 0%, 100% { transform: scaleY(1); opacity: 0.1; } 50% { transform: scaleY(2.5); opacity: 1; } }
        @keyframes segmentSlide { 0% { top: -100%; } 100% { top: 100%; } }
        .lb-1 { --bar-color: var(--rgb-red); animation-delay: 0s; }
        .lb-2 { --bar-color: var(--rgb-green); animation-delay: 0.15s; }
        .lb-3 { --bar-color: var(--rgb-blue); animation-delay: 0.3s; }
        .lb-4 { --bar-color: var(--rgb-red); animation-delay: 0.45s; }
        .lb-5 { --bar-color: var(--rgb-green); animation-delay: 0.6s; }
        #sync-percent { font-family: monospace; color: var(--rgb-blue); font-size: 14px; font-weight: bold; letter-spacing: 2px; }

        /* --- 2. KINETIC FRAME --- */
        .studio-frame-wrapper { width: 1366px; height: 657px; max-width: 95vw; max-height: 95vh; position: relative; background-color: #050506; border-radius: 14px; }
        .trace-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .trace-svg rect {
            fill: none; stroke: url(#rgbGradient); stroke-width: 3px; rx: 14px; ry: 14px;
            stroke-dasharray: 450 1150; stroke-dashoffset: 0; animation: rgbTrace 6s linear infinite;
            filter: drop-shadow(0 0 5px var(--red-glow)) drop-shadow(0 0 10px var(--blue-glow));
            will-change: stroke-dashoffset, filter;
        }
        .trace-svg.accelerate rect { animation-duration: 0.7s !important; stroke-width: 5px; }
        @keyframes rgbTrace { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -1600; } }

        /* --- 3. EDITOR & PREVIEW --- */
        .studio-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 0 20px; position: relative; z-index: 10; }
        .logo { font-weight: 900; background: linear-gradient(90deg, #ff0000, #00ff00, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; font-size: 14px; }
        .studio-viewport { display: flex; flex: 1; padding: 15px 0; overflow: hidden; position: relative; }
        .middle-stack { position: relative; display: flex; overflow: hidden; }
        .pane { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; height: 100%; width: 100%; }
        .visual-pane { flex: 1 1 auto; background: #fff; z-index: 1; transition: background 0.3s ease; }
        .pane-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; padding: 12px; background: rgba(255, 255, 255, 0.02); color: #555; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .code-area { 
            flex: 1; padding: 20px; font-family: 'SF Mono', 'Fira Code', monospace; 
            font-size: 13px; color: #a1a1aa; overflow-y: auto; outline: none; line-height: 1.6;
            white-space: pre-wrap; word-break: break-all; tab-size: 4; /* Optimized for SVGs */
        }

        .theme-toggle-btn { cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--rgb-blue); font-size: 8px; }
        .drag-bar { display: flex; justify-content: center; align-items: center; z-index: 100; touch-action: none; cursor: col-resize; width: 60px; margin: 0 -30px; }
        .drag-bar::after { content: ''; width: 1px; height: 40px; background: #333; transition: 0.3s; }
        .drag-bar.active::after { background: #fff; box-shadow: 0 0 20px #fff; height: 60px; }
        .output-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="buffer-wrapper">
            <div class="buffer-grid">
                <div class="loader-bar lb-1"></div><div class="loader-bar lb-2"></div><div class="loader-bar lb-3"></div><div class="loader-bar lb-4"></div><div class="loader-bar lb-5"></div>
            </div>
            <div id="sync-percent">00%</div>
        </div>
    </div>

    <div class="studio-frame-wrapper">
        <svg class="trace-svg" id="kinetic-svg"><rect width="100%" height="100%" rx="14" ry="14" stroke="url(#rgbGradient)"></rect>
            <defs><linearGradient id="rgbGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f00"/><stop offset="33%" stop-color="#0f0"/><stop offset="66%" stop-color="#00f"/><stop offset="100%" stop-color="#f00"/></linearGradient></defs>
        </svg>
        <div class="studio-container">
            <header style="height:60px; display:flex; align-items:center;"><div class="logo">NEUROSENTIX STUDIO 6.8</div></header>
            <main class="studio-viewport" id="viewport">
                <div class="middle-stack" id="middleStack">
                    <section class="pane">
                        <div class="pane-label">SOURCE EDITOR</div>
                        <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                    </section>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane visual-pane" id="visualPane">
                    <div class="pane-label" id="preview-header">PREVIEW
                        <div class="theme-toggle-btn" id="theme-toggle"><span id="theme-name">LIGHT</span></div>
                    </div>
                    <iframe class="output-frame" id="preview-frame"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport'), handle = document.getElementById('drag-handle'), middleStack = document.getElementById('middleStack'), visualPane = document.getElementById('visualPane'), codeInput = document.getElementById('code-input'), preview = document.getElementById('preview-frame'), kineticSvg = document.getElementById('kinetic-svg'), loader = document.getElementById('loader-overlay'), percentText = document.getElementById('sync-percent'), themeBtn = document.getElementById('theme-toggle'), themeName = document.getElementById('theme-name');
        
        let isDragging = false, currentRatio = 0.5, isDarkMode = false, debounceTimer;

        /* BOOT LOGIC */
        window.addEventListener('load', () => {
            let count = 0;
            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 3) + 1;
                if (count >= 100) { count = 100; clearInterval(interval); setTimeout(() => loader.classList.add('loader-hidden'), 400); }
                percentText.innerText = count + '%';
            }, 30);
        });

        /* SVG-SAFE PREVIEW ENGINE */
        function updatePreview() {
            const doc = preview.contentDocument;
            const theme = isDarkMode ? { bg: '#0f0f11', text: '#a1a1aa' } : { bg: '#fff', text: '#1a1a1b' };
            const style = `<style>body{font-family:sans-serif;padding:2rem;background:${theme.bg};color:${theme.text};transition:0.3s;} svg{max-width:100%;height:auto;display:block;margin:1rem 0;}</style>`;
            doc.open(); doc.write(style + codeInput.innerText); doc.close();
        }

        codeInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updatePreview, 300); // Debounce fixes lag
        });

        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            themeName.innerText = isDarkMode ? 'DARK' : 'LIGHT';
            visualPane.style.background = isDarkMode ? '#0f0f11' : '#fff';
            updatePreview();
        });

        /* DRAG LOGIC (GPU OPTIMIZED) */
        const startDrag = () => { isDragging = true; handle.classList.add('active'); kineticSvg.classList.add('accelerate'); };
        const stopDrag = () => { isDragging = false; handle.classList.remove('active'); kineticSvg.classList.remove('accelerate'); };
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let w = e.clientX - viewport.getBoundingClientRect().left;
            if (w > 150 && w < viewport.clientWidth - 150) {
                middleStack.style.flex = `0 0 ${w}px`;
                currentRatio = w / viewport.clientWidth;
            }
        });

        handle.addEventListener('mousedown', startDrag);
        document.addEventListener('mouseup', stopDrag);
        window.onload = () => { updatePreview(); codeInput.focus(); };
    </script>
</body>
</html>
