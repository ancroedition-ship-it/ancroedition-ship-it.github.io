<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSENTIX | MASTER FUSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #0a0a0a;
            --bg-pane: #161618; 
            --accent: #f59e0b; 
            --edge-color: #27272a; 
            --shared-font: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0c0c0e; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body {
            margin: 0; padding: 0; background: var(--bg-main); color: #e4e4e7;
            font-family: 'Inter', sans-serif; width: 100vw; height: 100vh;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        .ui-header { 
            height: 75px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--edge-color); 
            background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(15px); z-index: 1000;
        }
        
        .ns-path-anim { 
            stroke: var(--accent); stroke-width: 2.5; fill: none; 
            stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: 100; 
            animation: flow 3s ease-in-out infinite; 
        }
        .ns-node-pulse { animation: pulse 2s ease-in-out infinite; }

        @keyframes flow { 
            0% { stroke-dashoffset: 100; opacity: 0.3; }
            50% { stroke-dashoffset: 0; opacity: 1; }
            100% { stroke-dashoffset: -100; opacity: 0.3; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); transform-origin: center; }
        }

        /* --- WORKSPACE --- */
        .split-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 0; position: relative; }
        
        .pane { 
            display: flex; flex-direction: column; background: var(--bg-pane); 
            border: 1px solid var(--edge-color); border-radius: 12px; 
            overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #leftPane { width: 50%; min-width: 350px; flex-shrink: 0; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        #rightPane { flex: 1; min-width: 320px; border-top-left-radius: 0; border-bottom-left-radius: 0; border-left: none; }
        
        .label-bar { 
            height: 48px; background: #09090b; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--edge-color); flex-shrink: 0; 
        }
        .label-text { font-size: 10px; font-weight: 800; color: #71717a; text-transform: uppercase; letter-spacing: 0.15em; }
        
        /* --- EDITOR --- */
        #editor-wrapper { flex: 1; background: #0c0c0e; overflow: hidden; display: flex; }
        #editor { 
            flex: 1; width: 100%; outline: none; border: none;
            font-family: var(--shared-font); font-size: 13px; 
            line-height: 1.6; color: #facc15 !important; 
            padding: 20px; white-space: pre-wrap; overflow-y: auto;
        }

        #live-preview { flex: 1; width: 100%; border: none; background: transparent; }
        #drag-overlay { display: none; position: absolute; inset: 0; z-index: 500; background: transparent; }

        /* --- RESIZER --- */
        .resizer { 
            width: 8px; cursor: col-resize; position: relative; z-index: 100; 
            background: #111; border-left: 1px solid var(--edge-color); border-right: 1px solid var(--edge-color);
        }
        .resizer::after { 
            content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            width: 2px; height: 35px; background: #333; border-radius: 2px; transition: 0.3s;
        }
        .resizer:hover::after, .resizer.dragging::after { background: var(--accent); box-shadow: 0 0 10px var(--accent); height: 60px; }

        /* --- BUTTONS --- */
        .btn-action { 
            background: #1c1c1e; color: var(--accent); font-size: 9px; font-weight: 800; 
            padding: 5px 12px; border-radius: 4px; border: 1px solid #2d2d30; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-left: 6px;
        }
        .btn-action:hover { border-color: var(--accent); background: #27272a; }
        .btn-clear { color: #ef4444; border-color: #450a0a; }
        .btn-clear:hover { background: #450a0a; border-color: #ef4444; }
    </style>
</head>
<body>

    <header class="ui-header">
        <div class="flex items-center gap-4">
            <svg style="height:26px; width:95px;" viewBox="0 0 120 40">
                <path class="ns-path-anim" d="M15,25 Q40,5 65,25" />
                <path class="ns-path-anim" d="M65,25 L80,35" style="animation-delay: -1.5s;" />
                <circle class="ns-node-pulse" cx="15" cy="25" r="3" fill="var(--accent)" />
                <circle cx="65" cy="25" r="5" fill="var(--accent)" />
                <circle class="ns-node-pulse" cx="105" cy="25" r="4" fill="var(--accent)" style="animation-delay: 0.8s;" />
            </svg>
            <h1 style="font-size: 14px; font-weight: 900; letter-spacing: 0.4em; color: #52525b; text-transform: uppercase;">NeuroSentix</h1>
        </div>
        <div id="status" style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e;"></div>
    </header>

    <div class="split-container" id="container">
        <div class="pane" id="leftPane">
            <div class="label-bar">
                <span class="label-text">Source Terminal</span>
                <div class="flex">
                    <button id="clearBtn" class="btn-action btn-clear">Clear</button>
                    <button id="copyBtn" class="btn-action">Copy Code</button>
                </div>
            </div>
            <div id="editor-wrapper">
                <div id="editor" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>
        
        <div class="resizer" id="dragMe"></div>
        
        <div class="pane" id="rightPane">
            <div id="drag-overlay"></div>
            <div class="label-bar">
                <span class="label-text">Neural Preview</span>
            </div>
            <iframe id="live-preview"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const previewFrame = document.getElementById('live-preview');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const dragMe = document.getElementById('dragMe');
        const leftPane = document.getElementById('leftPane');
        const dragOverlay = document.getElementById('drag-overlay');
        const container = document.getElementById('container');
        
        const updatePreview = () => {
            const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            if (!doc) return;
            doc.open();
            doc.write(`
                <style>
                    ::-webkit-scrollbar { width: 4px; }
                    ::-webkit-scrollbar-track { background: #161618; }
                    ::-webkit-scrollbar-thumb { background: #3f3f46; }
                    body {
                        background: #161618;
                        color: #f59e0b;
                        font-family: 'JetBrains Mono', monospace;
                        font-size: 13px;
                        line-height: 1.6;
                        margin: 0;
                        padding: 30px;
                        word-break: break-all;
                        overflow-wrap: break-word;
                    }
                </style>
                ${editor.innerText || " "}
            `);
            doc.close();
        };

        editor.addEventListener('input', updatePreview);
        clearBtn.addEventListener('click', () => { editor.innerText = ""; updatePreview(); });
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.innerText);
            const original = copyBtn.innerText;
            copyBtn.innerText = "COPIED!";
            setTimeout(() => copyBtn.innerText = original, 2000);
        });

        // Optimized Smooth Resize Logic from index.html
        let isDragging = false;
        let animationFrameId = null;

        dragMe.addEventListener('mousedown', (e) => { 
            isDragging = true; 
            dragOverlay.style.display = "block"; 
            dragMe.classList.add('dragging');
            previewFrame.style.pointerEvents = "none";
            document.body.style.cursor = 'col-resize';
            e.preventDefault(); 
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            animationFrameId = requestAnimationFrame(() => {
                const containerBox = container.getBoundingClientRect();
                const minWidth = 350; 
                let newWidth = e.clientX - containerBox.left; 
                
                if (newWidth < minWidth) newWidth = minWidth;
                if (newWidth > containerBox.width - 320) newWidth = containerBox.width - 320;
                
                leftPane.style.width = newWidth + 'px';
            });
        });

        document.addEventListener('mouseup', () => { 
            if (isDragging) { 
                isDragging = false; 
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                dragOverlay.style.display = "none"; 
                dragMe.classList.remove('dragging');
                previewFrame.style.pointerEvents = "auto";
                document.body.style.cursor = 'default'; 
            } 
        });

        // Initialize
        updatePreview();
    </script>
</body>
</html>
