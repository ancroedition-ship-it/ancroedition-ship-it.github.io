<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | RGB Kinetic Studio</title>
    
    <style>
        :root {
            --bg-dark: #000;
            --panel-bg: #0a0a0b;
            --rgb-red: #ff0000;
            --rgb-green: #00ff00;
            --rgb-blue: #0066ff;
            --red-glow: rgba(255, 0, 0, 0.6);
            --blue-glow: rgba(0, 100, 255, 0.6);
            --border: rgba(255, 255, 255, 0.05);
            --header-h: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Inter', sans-serif;
            touch-action: none;
        }

        /* --- 1. BOOT LOADER OVERLAY --- */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-hidden { opacity: 0; visibility: hidden; }

        .buffer-wrapper { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        
        .buffer-grid {
            display: flex; align-items: center; gap: 12px;
            -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(255,255,255,0.05));
        }

        .loader-bar {
            width: 6px; height: 35px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; position: relative; overflow: hidden;
            animation: barGrow 1.2s ease-in-out infinite;
        }

        .loader-bar::after {
            content: ''; position: absolute; top: -100%; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--bar-color), transparent);
            animation: segmentSlide 0.8s ease-in-out infinite;
            filter: drop-shadow(0 0 10px var(--bar-color));
        }

        @keyframes barGrow { 0%, 100% { transform: scaleY(1); opacity: 0.1; } 50% { transform: scaleY(2.5); opacity: 1; } }
        @keyframes segmentSlide { 0% { top: -100%; } 100% { top: 100%; } }

        .lb-1 { --bar-color: var(--rgb-red); animation-delay: 0s; }
        .lb-2 { --bar-color: var(--rgb-green); animation-delay: 0.15s; }
        .lb-3 { --bar-color: var(--rgb-blue); animation-delay: 0.3s; }
        .lb-4 { --bar-color: var(--rgb-red); animation-delay: 0.45s; }
        .lb-5 { --bar-color: var(--rgb-green); animation-delay: 0.6s; }

        .loading-status { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .loading-text { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 5px; animation: textPulse 2s infinite; }
        #sync-percent { font-family: monospace; color: var(--rgb-blue); font-size: 14px; font-weight: bold; letter-spacing: 2px; }

        @keyframes textPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }

        /* --- 2. MAIN STUDIO FRAME --- */
        .studio-frame-wrapper {
            width: 1366px; height: 657px;
            max-width: 95vw; max-height: 95vh;
            position: relative;
            background-color: #050506;
            border-radius: 14px;
        }

        .trace-svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }

        .trace-svg rect {
            fill: none;
            stroke: url(#rgbGradient);
            stroke-width: 3px;
            rx: 14px; ry: 14px;
            stroke-dasharray: 450 1150;
            stroke-dashoffset: 0;
            animation: rgbTrace 6s linear infinite;
            filter: drop-shadow(0 0 5px var(--red-glow)) drop-shadow(0 0 10px var(--blue-glow));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .trace-svg.accelerate rect {
            animation-duration: 0.7s !important;
            stroke-width: 5px;
            filter: drop-shadow(0 0 15px var(--red-glow)) drop-shadow(0 0 25px var(--blue-glow));
        }

        @keyframes rgbTrace { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -1600; } }

        #rgbGradient { transform-origin: center; animation: rotateGradient 10s linear infinite; }
        .accelerate #rgbGradient { animation-duration: 1.5s !important; }
        @keyframes rotateGradient { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 3. UI LAYOUT --- */
        .studio-container { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 0 20px; position: relative; z-index: 10; }
        .studio-header { height: var(--header-h); display: flex; align-items: center; border-bottom: 1px solid var(--border); }
        
        .logo { 
            font-weight: 900; 
            background: linear-gradient(90deg, #ff0000, #00ff00, #0066ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 3px; font-size: 14px; 
        }

        .studio-viewport { display: flex; flex: 1; padding: 15px 0; overflow: hidden; position: relative; }
        .dir-row { flex-direction: row !important; }
        .dir-col { flex-direction: column !important; }

        .middle-stack { position: relative; display: flex; overflow: hidden; }

        .pane { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; height: 100%; width: 100%; }
        .visual-pane { flex: 1 1 auto; background: #fff; z-index: 1; }

        .pane-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; padding: 12px; background: rgba(255, 255, 255, 0.02); color: #555; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; }
        .size-tag { font-family: monospace; color: #0066ff; opacity: 0.6; }

        .drag-bar { display: flex; justify-content: center; align-items: center; flex-shrink: 0; z-index: 100; touch-action: none; }
        .drag-bar::after { content: ''; background: #333; transition: 0.3s; }
        .row-bar { width: 60px; margin: 0 -30px; cursor: col-resize; height: 100%; }
        .row-bar::after { width: 1px; height: 40px; }
        .col-bar { height: 60px; margin: -30px 0; cursor: row-resize; width: 100%; }
        .col-bar::after { height: 1px; width: 40px; }

        .drag-bar.active::after { background: #fff; box-shadow: 0 0 20px #fff, 0 0 40px var(--blue-glow); height: 60px; width: 2px; }

        #drag-shield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; }
        .code-area { flex: 1; padding: 15px; font-family: 'SF Mono', monospace; font-size: 13px; color: #a1a1aa; overflow-y: auto; outline: none; line-height: 1.6; }
        .output-frame { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="buffer-wrapper">
            <div class="buffer-grid">
                <div class="loader-bar lb-1"></div>
                <div class="loader-bar lb-2"></div>
                <div class="loader-bar lb-3"></div>
                <div class="loader-bar lb-4"></div>
                <div class="loader-bar lb-5"></div>
            </div>
            <div class="loading-status">
                <span class="loading-text">Initializing Neural Sync</span>
                <span id="sync-percent">00%</span>
            </div>
        </div>
    </div>

    <div id="drag-shield"></div>

    <div class="studio-frame-wrapper">
        <svg class="trace-svg" id="kinetic-svg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="rgbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff0000" />
                    <stop offset="33%" stop-color="#00ff00" />
                    <stop offset="66%" stop-color="#0066ff" />
                    <stop offset="100%" stop-color="#ff0000" />
                </linearGradient>
            </defs>
            <rect x="1" y="1" width="99.8%" height="99.8%" rx="14" ry="14"></rect>
        </svg>

        <div class="studio-container">
            <header class="studio-header">
                <div class="logo">NEUROSENTIX RGB_SYSTEM</div>
            </header>

            <main class="studio-viewport" id="viewport">
                <div class="middle-stack" id="middleStack">
                    <section class="pane">
                        <div class="pane-label"><span>Source Editor</span><span class="size-tag" id="src-size">--</span></div>
                        <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                    </section>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane visual-pane" id="visualPane">
                    <div class="pane-label" style="background: #fdfdfd;"><span style="color: #bbb;">Visual Output</span><span class="size-tag" id="vis-size" style="opacity: 0.3;">--</span></div>
                    <iframe class="output-frame" id="preview-frame"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const handle = document.getElementById('drag-handle');
        const shield = document.getElementById('drag-shield');
        const middleStack = document.getElementById('middleStack');
        const visualPane = document.getElementById('visualPane');
        const srcSize = document.getElementById('src-size');
        const visSize = document.getElementById('vis-size');
        const codeInput = document.getElementById('code-input');
        const preview = document.getElementById('preview-frame');
        const kineticSvg = document.getElementById('kinetic-svg');
        const loader = document.getElementById('loader-overlay');
        const percentText = document.getElementById('sync-percent');
        
        let isDragging = false;
        let currentRatio = 0.5;
        const DPI = 96;

        /* BOOT LOGIC */
        window.addEventListener('load', () => {
            let count = 0;
            const counterInterval = setInterval(() => {
                let increment = Math.floor(Math.random() * 3) + 1;
                if (count > 85) increment = 1;
                count += increment;
                if (count >= 100) {
                    count = 100;
                    clearInterval(counterInterval);
                    setTimeout(() => {
                        loader.classList.add('loader-hidden');
                        kineticSvg.classList.add('accelerate');
                        setTimeout(() => kineticSvg.classList.remove('accelerate'), 1500);
                    }, 400);
                }
                percentText.innerText = (count < 10 ? '0' : '') + count + '%';
            }, 30);
        });

        /* RESIZE & DRAG LOGIC */
        function pxToIn(px) { return (px / DPI).toFixed(2); }
        function updateSizeLabels() {
            const editorRect = middleStack.getBoundingClientRect();
            const visRect = visualPane.getBoundingClientRect();
            srcSize.innerText = `${pxToIn(editorRect.width)}"W x ${pxToIn(editorRect.height)}"H`;
            visSize.innerText = `${pxToIn(visRect.width)}"W x ${pxToIn(visRect.height)}"H`;
        }

        function checkOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            const viewRect = viewport.getBoundingClientRect();
            if (isPortrait) {
                viewport.className = "studio-viewport dir-col";
                handle.className = "drag-bar col-bar";
                middleStack.style.width = "100%";
                const targetH = viewRect.height * currentRatio;
                middleStack.style.height = `${targetH}px`;
                middleStack.style.flex = `0 0 ${targetH}px`;
            } else {
                viewport.className = "studio-viewport dir-row";
                handle.className = "drag-bar row-bar";
                middleStack.style.height = "100%";
                const targetW = viewRect.width * currentRatio;
                middleStack.style.width = `${targetW}px`;
                middleStack.style.flex = `0 0 ${targetW}px`;
            }
            updateSizeLabels();
        }

        function onMove(e) {
            if (!isDragging) return;
            const isPortrait = window.innerHeight > window.innerWidth;
            const viewRect = viewport.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            if (isPortrait) {
                let newH = clientY - viewRect.top;
                if (newH < 80) newH = 80;
                if (newH > viewRect.height - 100) newH = viewRect.height - 100;
                middleStack.style.height = `${newH}px`;
                middleStack.style.flex = `0 0 ${newH}px`;
                currentRatio = newH / viewRect.height;
            } else {
                let newW = clientX - viewRect.left;
                if (newW < 150) newW = 150;
                if (newW > viewRect.width - 200) newW = viewRect.width - 200;
                middleStack.style.width = `${newW}px`;
                middleStack.style.flex = `0 0 ${newW}px`;
                currentRatio = newW / viewRect.width;
            }
            updateSizeLabels();
        }

        function updatePreview() {
            const doc = preview.contentDocument || preview.contentWindow.document;
            const head = `<style>body{font-family:sans-serif;padding:20px;margin:0;word-wrap:break-word;background:#fff;}</style>`;
            doc.open(); doc.write(head + codeInput.innerText); doc.close();
        }

        const startDrag = () => { isDragging = true; shield.style.display = 'block'; handle.classList.add('active'); kineticSvg.classList.add('accelerate'); };
        const stopDrag = () => { isDragging = false; shield.style.display = 'none'; handle.classList.remove('active'); kineticSvg.classList.remove('accelerate'); };

        handle.addEventListener('mousedown', startDrag);
        handle.addEventListener('touchstart', (e) => { startDrag(); if(e.cancelable) e.preventDefault(); }, {passive: false});
        document.addEventListener('mousemove', onMove);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);
        codeInput.addEventListener('input', updatePreview);
        window.addEventListener('resize', checkOrientation);
        window.onload = () => { checkOrientation(); updatePreview(); codeInput.focus(); };
    </script>
</body>
</html>
