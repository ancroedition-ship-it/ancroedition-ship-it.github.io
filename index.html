<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix | Multi-Layer Omni</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; background-color: #000;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'SF Mono', 'Fira Code', monospace;
        }

        /* HUD FRAME & ADAPTIVE BOUNDARIES */
        .hud-wrapper {
            width: 1366px; height: 657px;
            max-width: 98vw; max-height: 95vh;
            position: relative;
            background-color: var(--bg-dark);
            border: 1px solid rgba(0, 102, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .studio-container {
            position: absolute; top: 35px; left: 35px; right: 35px; bottom: 35px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .viewport { display: flex; flex: 1; overflow: hidden; position: relative; }
        .orientation-portrait { flex-direction: column !important; }

        .pane { background: rgba(0,0,0,0.5); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; }
        .preview-pane { flex: 1; background: #fff; }

        /* RESTORED LABEL */
        .pane-label { font-size: 9px; padding: 10px; background: rgba(255,255,255,0.02); color: #555; border-bottom: 1px solid var(--border); letter-spacing: 1px; }

        .code-area { flex: 1; padding: 20px; color: #a1a1aa; outline: none; font-size: 13px; white-space: pre-wrap; overflow-y: auto; tab-size: 4; }

        /* CLICK-TO-DRAG 20PX BAR */
        .drag-bar { 
            width: 20px; cursor: pointer; background: rgba(255, 255, 255, 0.03); 
            display: flex; align-items: center; justify-content: center; z-index: 100;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .drag-bar.active { background: var(--hud-red) !important; box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }
        .drag-bar::after { content: ":::"; color: rgba(255,255,255,0.2); transform: rotate(90deg); letter-spacing: 2px; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="hud-wrapper" id="main-hud">
        <div class="studio-container">
            <header style="height:30px; display:flex; justify-content:space-between; align-items:center; color:var(--hud-blue); font-size:10px; letter-spacing:2px;">
                <span>NEUROSENTIX_OMNI_v14.6</span>
                <span id="status-msg">READY</span>
            </header>
            
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="pane-label">MULTI-LAYER_SOURCE (HTML / CSS / JS / SVG)</div>
                    <div class="code-area" contenteditable="true" spellcheck="false" id="code-input"></div>
                </div>
                
                <div class="drag-bar" id="drag-handle" title="Click to Toggle Drag"></div>
                
                <section class="pane preview-pane">
                    <div class="pane-label" style="background:#eee; color:#000;">UNIFIED_RUNTIME</div>
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const editor = document.getElementById('editorPane');
        const handle = document.getElementById('drag-handle');
        const codeInput = document.getElementById('code-input');
        const statusMsg = document.getElementById('status-msg');

        let isSticky = false;

        // --- STICKY DRAG LOGIC ---
        handle.addEventListener('click', () => {
            isSticky = !isSticky;
            handle.classList.toggle('active', isSticky);
            statusMsg.innerText = isSticky ? "DRAG_ACTIVE" : "READY";
            statusMsg.style.color = isSticky ? "var(--hud-red)" : "var(--hud-blue)";
        });

        document.addEventListener('mousemove', (e) => {
            if (!isSticky) return;
            const isPortrait = window.innerWidth < window.innerHeight;
            const rect = viewport.getBoundingClientRect();

            if (isPortrait) {
                let y = e.clientY - rect.top;
                if (y > 100 && y < rect.height - 100) editor.style.flex = `0 0 ${y}px`;
            } else {
                let x = e.clientX - rect.left;
                if (x > 200 && x < rect.width - 200) editor.style.flex = `0 0 ${x}px`;
            }
        });

        // --- ADAPTIVE BOUNDARIES ---
        function checkLayout() {
            const isPortrait = window.innerWidth < window.innerHeight;
            viewport.classList.toggle('orientation-portrait', isPortrait);
            handle.style.width = isPortrait ? "100%" : "20px";
            handle.style.height = isPortrait ? "20px" : "auto";
        }
        window.addEventListener('resize', checkLayout);

        // --- COMPILER ---
        function update() {
            const blob = new Blob([`<!DOCTYPE html><html><body>${codeInput.innerText}</body></html>`], {type: 'text/html'});
            document.getElementById('preview-frame').src = URL.createObjectURL(blob);
        }

        codeInput.addEventListener('input', update);
        
        window.onload = () => {
            checkLayout();
            codeInput.innerText = "<h1>Multi-Layer Source Restored</h1><p>HTML, CSS, JS, and SVG are all functional in this unified pane.</p>";
            update();
        };
    </script>
</body>
</html>
