<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neurosentix Studio</title>
    
    <style>
        :root {
            --hud-red: #ff1744;
            --hud-blue: #0066ff;
            --hud-green: #00ff88;
            --bg-dark: #08090b;
            --border: rgba(255, 255, 255, 0.05);
            --boundary-color: rgba(0, 102, 255, 0.2);
            --font-main: 'SF Mono', 'Fira Code', monospace;
        }

        /* --- NEUROSENTIX CORE ANIMATIONS --- */
        @keyframes horizontal-rotate-flow {
            0% { transform: rotate(90deg) translateX(0px); opacity: 0.8; }
            50% { transform: rotate(90deg) translateX(15px); opacity: 1; }
            100% { transform: rotate(90deg) translateX(0px); opacity: 0.8; }
        }
        .horizontal-svg { transform: rotate(90deg); transform-origin: center; }
        .animate-scan { animation: horizontal-rotate-flow 3s ease-in-out infinite; }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background-color: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: var(--font-main); user-select: none; }

        /* BOOT LOADER */
        #boot-loader { position: absolute; inset: 0; background: var(--bg-dark); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--hud-blue); font-size: 10px; letter-spacing: 4px; transition: opacity 0.5s; }
        .load-track { width: 220px; height: 2px; background: rgba(0,102,255,0.1); margin-top: 15px; position: relative; overflow: hidden; }
        #load-bar { position: absolute; height: 100%; width: 0%; background: var(--hud-red); box-shadow: 0 0 10px var(--hud-red); transition: width 0.3s; }

        .hud-wrapper { width: 100vw; height: 100vh; position: relative; background-color: var(--bg-dark); }
        .studio-container { position: absolute; inset: 10px; display: flex; flex-direction: column; z-index: 10; }
        .studio-header { height: 30px; display: flex; align-items: center; justify-content: space-between; color: var(--hud-blue); font-size: 10px; letter-spacing: 2px; }

        .nav-tools { display: flex; align-items: center; gap: 10px; }
        #forensic-btn { background: transparent; border: 1px solid var(--hud-red); color: var(--hud-red); font-size: 8px; cursor: pointer; height: 16px; padding: 0 6px; font-family: inherit; text-transform: uppercase; border-radius: 2px; }

        /* SEARCH BOX */
        .search-container { padding: 5px 10px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--boundary-color); margin: 5px; display: flex; align-items: center; }
        #search-input { background: transparent; border: none; color: var(--hud-blue); font-family: inherit; font-size: 10px; padding: 4px; outline: none; width: 100%; }
        #match-count { color: var(--hud-blue); font-size: 9px; margin-left: 10px; white-space: nowrap; opacity: 0.6; }

        .viewport { display: flex; flex: 1; overflow: hidden; }
        .pane { background: rgba(0,0,0,0.8); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .editor-pane { flex: 0 0 50%; min-width: 50px; }
        .preview-pane { flex: 1; background: #fff; border: 2px solid #ccc; position: relative; }

        .editor-layout { display: flex; flex: 1; overflow: hidden; border: 2px solid var(--boundary-color); margin: 5px; }
        
        /* LINE NUMBER HIGHLIGHTING */
        #line-numbers { width: 40px; padding: 20px 0; background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.2); font-size: 13px; text-align: center; border-right: 2px solid var(--boundary-color); overflow: hidden; line-height: 1.5; pointer-events: none; }
        .ln-mark { color: var(--hud-red) !important; text-shadow: 0 0 8px var(--hud-red); font-weight: bold; background: rgba(255, 23, 68, 0.2); }

        .code-area { flex: 1; padding: 20px; color: #a1a1aa; outline: none; font-size: 13px; white-space: pre; overflow: auto; line-height: 1.5; background-color: #1f2933; -webkit-user-modify: read-write-plaintext-only; tab-size: 4; }

        .drag-bar { background: rgba(0, 102, 255, 0.1); z-index: 100; display: flex; align-items: center; justify-content: center; cursor: col-resize; width: 15px; }
        .drag-bar::before { content: ""; width: 2px; height: 30%; background: var(--hud-blue); }
        
        iframe { width: 100%; height: 100%; border: none; }

        /* TERMINAL LINK */
        #chat-trigger { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: var(--bg-dark); border: 2px solid var(--hud-blue); border-radius: 50%; color: var(--hud-blue); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 600; font-size: 20px; box-shadow: 0 0 10px var(--hud-blue); }
        #chat-dialog { position: fixed; inset: 0; background: rgba(10, 10, 15, 0.98); z-index: 900; display: none; flex-direction: column; padding: 30px; }
        #chat-body { flex: 1; margin-top: 20px; border: 1px solid var(--boundary-color); padding: 20px; color: #ccc; font-size: 13px; overflow-y: auto; background: #1f2933; }
        .chat-input-wrapper { margin-top: 15px; display: flex; gap: 10px; border: 1px solid var(--boundary-color); padding: 10px; align-items: flex-end; }
        #terminal-input { flex: 1; background: transparent; border: none; outline: none; color: var(--hud-red); font-family: inherit; resize: none; }
        #send-btn { background: transparent; border: 1px solid var(--hud-red); color: var(--hud-red); font-size: 10px; cursor: pointer; padding: 4px 12px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="boot-loader">
        <div>NEUROSENTIX</div>
        <div class="load-track"><div id="load-bar"></div></div>
    </div>

    <div class="hud-wrapper">
        <div class="studio-container">
            <header class="studio-header">
                <span>NEUROSENTIX STUDIO</span>
                <div class="nav-tools">
                    <button id="forensic-btn">FORENSIC_SCAN</button> 
                    <span id="status-indicator" style="color:var(--hud-green)">● LIVE_SYNC</span>
                </div>
            </header>
            <main class="viewport" id="viewport">
                <div class="pane editor-pane" id="editorPane">
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="search" autocomplete="off" spellcheck="false">
                        <span id="match-count">0 MATCHES</span>
                    </div>
                    <div class="editor-layout">
                        <div id="line-numbers"></div>
                        <div id="code-input" class="code-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>
                <div class="drag-bar" id="drag-handle"></div>
                <section class="pane preview-pane">
                    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
                </section>
            </main>
        </div>
    </div>

    <div id="chat-trigger">◈</div>
    <div id="chat-dialog">
        <div style="display:flex; justify-content:space-between; color:var(--hud-red); font-size:11px; letter-spacing:3px; border-bottom:1px solid var(--boundary-color); padding-bottom:10px;">
            <span>TERMINAL_LINK</span>
            <span id="close-dialog" style="cursor:pointer;">[ ESC_X ]</span>
        </div>
        <div id="chat-body">> [SYSTEM]: Live Context Ready.</div>
        <div class="chat-input-wrapper">
            <span style="color:var(--hud-red)">USR:</span>
            <textarea id="terminal-input" placeholder="Type command..." rows="1"></textarea>
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editorPane'),
              codeInput = document.getElementById('code-input'),
              preview = document.getElementById('preview-frame'),
              lineNumbers = document.getElementById('line-numbers'),
              searchInput = document.getElementById('search-input'),
              matchCount = document.getElementById('match-count'),
              handle = document.getElementById('drag-handle'),
              viewport = document.getElementById('viewport');

        let isDragging = false, syncTimer;

        // --- LINE NUMBER & SEARCH SYNC ---
        function updateUI() {
            const query = searchInput.value.toLowerCase();
            const lines = codeInput.innerText.split('\n');
            let matches = 0;
            let html = "";

            lines.forEach((line, i) => {
                const hasMatch = query && line.toLowerCase().includes(query);
                if(hasMatch) matches++;
                html += `<div class="${hasMatch ? 'ln-mark' : ''}" style="height:1.5em;">${i+1}</div>`;
            });

            lineNumbers.innerHTML = html;
            matchCount.innerText = `${matches} MATCHES`;
            lineNumbers.scrollTop = codeInput.scrollTop;
        }

        // --- PREVIEW ENGINE ---
        function updatePreview() {
            const code = codeInput.innerText || "";
            // RESTORING MANUAL NEUROSENTIX CSS IN PREVIEW
            const neuroStyles = `
                <style>
                    body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#fff; overflow:hidden; }
                    .horizontal-svg { transform: rotate(90deg); transform-origin: center; }
                    @keyframes horizontal-rotate-flow {
                        0% { transform: rotate(90deg) translateX(0px); opacity: 0.8; }
                        50% { transform: rotate(90deg) translateX(15px); opacity: 1; }
                        100% { transform: rotate(90deg) translateX(0px); opacity: 0.8; }
                    }
                    .animate-scan { animation: horizontal-rotate-flow 3s ease-in-out infinite; }
                    svg { max-width: 95%; max-height: 95%; }
                </style>
            `;
            const blob = new Blob([`<html><head>${neuroStyles}</head><body>${code}</body></html>`], { type: 'text/html' });
            preview.src = URL.createObjectURL(blob);
        }

        // --- DRAG LOGIC ---
        handle.onmousedown = () => isDragging = true;
        document.onmouseup = () => isDragging = false;
        document.onmousemove = (e) => {
            if (!isDragging) return;
            const x = e.clientX - viewport.getBoundingClientRect().left;
            if (x > 100 && x < viewport.offsetWidth - 100) editor.style.flex = `0 0 ${x}px`;
        };

        // Events
        codeInput.oninput = () => { clearTimeout(syncTimer); updateUI(); syncTimer = setTimeout(updatePreview, 500); };
        searchInput.oninput = updateUI;
        codeInput.onscroll = () => lineNumbers.scrollTop = codeInput.scrollTop;

        document.getElementById('chat-trigger').onclick = () => document.getElementById('chat-dialog').style.display = 'flex';
        document.getElementById('close-dialog').onclick = () => document.getElementById('chat-dialog').style.display = 'none';

        window.onload = () => {
            document.getElementById('load-bar').style.width = "100%";
            setTimeout(() => document.getElementById('boot-loader').style.opacity = "0", 800);
            updateUI(); updatePreview();
        };
    </script>
</body>
</html>
