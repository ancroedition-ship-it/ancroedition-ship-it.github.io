<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEUROSENTIX | HTML EDITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-main: #0a0a0a;
            --bg-pane: #161618; 
            --shared-font-size: 14px; 
            --shared-line-height: 1.6;
            --shared-font: 'JetBrains Mono', monospace;
            --accent: #f59e0b; 
            --edge-color: #27272a; 
        }
        * { box-sizing: border-box; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0c0c0e; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body {
            margin: 0; padding: 0; background: var(--bg-main); color: #e4e4e7;
            font-family: 'Inter', sans-serif; width: 1366px; height: 650px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .ui-header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--edge-color); 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); z-index: 100;
        }
        
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .ns-svg { height: 32px; width: auto; overflow: visible; }
        .ns-path { 
            stroke: var(--accent); stroke-width: 2; fill: none; 
            stroke-dasharray: 100; stroke-dashoffset: 100; 
            animation: draw 3s ease-in-out infinite alternate;
        }
        .ns-node { fill: var(--accent); animation: pulse 2s ease-in-out infinite; }
        .header-text { font-size: 18px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase; color: #71717a; }
        
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; r: 3; } 50% { opacity: 1; r: 5; } }

        .split-container { display: flex; flex: 1; overflow: hidden; padding: 0; gap: 0; position: relative; }
        .pane { display: flex; flex-direction: column; border-bottom: 1px solid var(--edge-color); background: var(--bg-pane); overflow: hidden; }
        
        #leftPane { width: 683px; min-width: 400px; flex-shrink: 0; border-right: none; }
        #rightPane { flex: 1; min-width: 320px; display: flex; flex-direction: column; position: relative; border-left: none; }
        
        .label-bar { 
            height: 48px; background: #09090b; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--edge-color); flex-shrink: 0; 
        }
        .label-text { font-size: 10px; font-weight: 800; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; }
        
        #textarea-wrapper { flex: 1; padding: 0; display: flex; overflow: hidden; background: #0c0c0e; }
        
        #editor { 
            flex: 1; width: 100%; outline: none; border: none;
            font-family: var(--shared-font); font-size: var(--shared-font-size); 
            line-height: var(--shared-line-height); color: #facc15 !important; 
            font-weight: 500; cursor: text;
            padding: 20px 0px 20px 60px; 
            white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word; 
            overflow-y: auto;
        }

        #live-preview { flex: 1; width: 100%; border: none; background: transparent; }
        #drag-overlay { display: none; position: absolute; inset: 0; z-index: 500; background: transparent; }

        .resizer { 
            width: 8px; cursor: col-resize; position: relative; z-index: 1000; 
            background: #111; border-left: 1px solid var(--edge-color); border-right: 1px solid var(--edge-color);
        }
        .resizer::after { 
            content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            width: 2px; height: 30px; background: #333; border-radius: 2px;
        }

        .btn-action { 
            background: #1c1c1e; color: #f59e0b; font-size: 9px; font-weight: 800; 
            padding: 5px 12px; border-radius: 4px; border: 1px solid #2d2d30; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
            margin-left: 5px;
        }
        .btn-action:hover { border-color: #f59e0b; background: #27272a; }
        .btn-clear { color: #ef4444; border-color: #450a0a; margin-right: 5px; }
    </style>
</head>
<body>

    <header class="ui-header">
        <div class="logo-container">
            <svg class="ns-svg" viewBox="0 0 100 40">
                <path class="ns-path" d="M10,20 Q30,5 50,20 T90,20" />
                <circle class="ns-node" cx="10" cy="20" r="4" />
                <circle class="ns-node" cx="50" cy="20" r="4" style="animation-delay: 0.5s;" />
                <circle class="ns-node" cx="90" cy="20" r="4" style="animation-delay: 1s;" />
            </svg>
            <h1 class="header-text">NeuroSentix</h1>
        </div>
    </header>

    <div class="split-container" id="container">
        <div class="pane" id="leftPane">
            <div class="label-bar">
                <span class="label-text">Source Code</span>
                <div class="flex">
                    <button id="clearBtn" class="btn-action btn-clear">CLEAR</button>
                    <button id="copyBtn" class="btn-action">COPY CODE</button>
                </div>
            </div>
            <div id="textarea-wrapper">
                <div id="editor" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>
        
        <div class="resizer" id="dragMe"></div>
        
        <div class="pane" id="rightPane">
            <div id="drag-overlay"></div>
            <div class="label-bar">
                <span class="label-text">Live Preview</span>
            </div>
            <iframe id="live-preview"></iframe>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const previewFrame = document.getElementById('live-preview');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const dragMe = document.getElementById('dragMe');
        const leftPane = document.getElementById('leftPane');
        const dragOverlay = document.getElementById('drag-overlay');
        const container = document.getElementById('container');
        
        const updatePreview = () => {
            const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            if (!doc) return;
            doc.open();
            doc.write(`
                <style>
                    ::-webkit-scrollbar { width: 4px; }
                    ::-webkit-scrollbar-track { background: #161618; }
                    ::-webkit-scrollbar-thumb { background: #3f3f46; }
                    body {
                        background: #161618;
                        color: #f59e0b;
                        font-family: 'JetBrains Mono', monospace;
                        font-size: 14px;
                        line-height: 1.6;
                        margin: 0;
                        padding: 20px 40px;
                        word-break: break-all;
                        overflow-wrap: break-word;
                        overflow-x: hidden;
                    }
                </style>
                ${editor.innerText || " "}
            `);
            doc.close();
        };

        editor.addEventListener('input', updatePreview);
        clearBtn.addEventListener('click', () => { editor.innerText = ""; updatePreview(); });
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.innerText);
            copyBtn.innerText = "COPIED!";
            setTimeout(() => copyBtn.innerText = "COPY CODE", 2000);
        });

        // Optimized Smooth Resize Logic
        let isDragging = false;
        let animationFrameId = null;

        dragMe.addEventListener('mousedown', (e) => { 
            isDragging = true; 
            dragOverlay.style.display = "block"; 
            previewFrame.style.pointerEvents = "none";
            document.body.style.cursor = 'col-resize';
            e.preventDefault(); 
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);

            animationFrameId = requestAnimationFrame(() => {
                const containerBox = container.getBoundingClientRect();
                const minWidth = 400; 
                let newWidth = e.clientX - containerBox.left; 
                
                if (newWidth < minWidth) newWidth = minWidth;
                if (newWidth > containerBox.width - 320) newWidth = containerBox.width - 320;
                
                leftPane.style.width = newWidth + 'px';
            });
        });

        document.addEventListener('mouseup', () => { 
            if (isDragging) { 
                isDragging = false; 
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                dragOverlay.style.display = "none"; 
                previewFrame.style.pointerEvents = "auto";
                document.body.style.cursor = 'default'; 
            } 
        });

        updatePreview();
    </script>
</body>
</html>
